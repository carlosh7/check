version: '3.8'

services:
  check-app:
    build: .
    container_name: check-app
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    volumes:
      - ./persistence:/usr/src/app/persistence
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATA_PATH=/usr/src/app/persistence
      - ALLOWED_ORIGINS=http://localhost:3000
      - JWT_SECRET=check-pro-docker-secret-key
      - ADMIN_EMAIL=admin@check.com
      - ADMIN_PASSWORD=admin123
      - APP_URL=http://localhost:3000
    restart: unless-stopped
    networks:
      - check-network

volumes:
  node_modules:

networks:
  check-network:
    driver: bridge