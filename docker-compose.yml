version: '3.8'

services:
  check-app:
    build: .
    container_name: check-app
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - ALLOWED_ORIGINS=http://localhost:3000
    command: >
      sh -c "npm install && npm start"
    restart: unless-stopped
    networks:
      - check-network

volumes:
  node_modules:

networks:
  check-network:
    driver: bridge