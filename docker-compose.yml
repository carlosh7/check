version: '3.8'

services:
  check-app:
    build: .
    container_name: check-app
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    volumes:
      - ./persistence:/usr/src/app/persistence
      - /home/data_check:/home/data_check
      - .:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATA_PATH=/home/data_check
      - ALLOWED_ORIGINS=http://localhost:3000
      - APP_URL=http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - check-network

volumes:
  node_modules:

networks:
  check-network:
    driver: bridge
