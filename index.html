<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Check Elite Pro - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✓</text></svg>">
    <style>
        /* Estilos críticos para prevenir FOUC */
        html.dark {
            --bg-app: #202124;
            --bg-sidebar: #292a2d;
            --bg-card: #292a2d;
            --bg-input: #35363a;
            --bg-hover: #3c4043;
            --bg-active: #4a4d51;
            --primary: #8ab4f8;
            --primary-hover: #aecbfa;
            --primary-light: rgba(138, 180, 248, 0.15);
            --text-main: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-muted: #80868b;
            --border: #3c4043;
            --border-light: #303134;
            --border-focus: rgba(138, 180, 248, 0.5);
            --bg-card-rgb: 41, 42, 45;
        }
        
        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        #view-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-app);
        }
    </style>
    <link rel="stylesheet" href="/css/styles.css?v=12.28.13">
    <link rel="stylesheet" href="/css/modern.css?v=12.28.13">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body class="antialiased">

    <!-- VIEW: LOGIN (oculto por defecto, se muestra solo si no hay sesión) -->
    <div id="view-login" class="fixed inset-0 flex items-center justify-center p-6 bg-[var(--bg-app)] hidden">
        <!-- Fondo decorativo sutil -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-20">
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
        </div>

        <div class="glass-card w-full max-w-md p-10 relative z-10 border border-white/10 shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-6 shadow-inner">
                    <span class="material-symbols-outlined text-primary text-4xl">verified_user</span>
                </div>
                <h2 class="text-3xl font-black text-white tracking-tight leading-tight">Bienvenido a Check<span class="text-primary italic">.</span></h2>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.3em] mt-3">Sistema de Registro Elite</p>
            </div>

            <form id="form-login" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Email Corporativo</label>
                    <input type="email" id="login-email" required class="w-full bg-slate-900/50 text-white text-sm rounded-2xl px-5 py-4 border border-white/10 focus:border-primary/50 outline-none transition-all placeholder:text-slate-700" placeholder="admin@check.com">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Contraseña</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-900/50 text-white text-sm rounded-2xl px-5 py-4 border border-white/10 focus:border-primary/50 outline-none transition-all placeholder:text-slate-700" placeholder="••••••••">
                </div>
                
                <button type="submit" class="w-full py-4 bg-primary text-white font-black text-xs rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest mt-4">Entrar al Panel</button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 flex flex-col items-center gap-3">
                <a href="https://smarteventos.co/" target="_blank" rel="noopener noreferrer" class="text-[10px] text-primary hover:opacity-80 transition-opacity uppercase tracking-widest font-bold">
                    Powered by Smart Eventos
                </a>
                <div class="flex items-center gap-4">
                    <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">&copy; 2026 Check Pro</p>
                    <span id="login-version-display" class="text-[10px] text-slate-500 font-bold app-version-text">v12.28.12</span>
                </div>
                <button id="btn-open-terms" class="text-[10px] text-slate-500 hover:text-primary transition-colors uppercase tracking-widest font-bold">Términos y Privacidad</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <script type="module" src="/js/app.js?v=12.28.13&t=202603272140"></script>

</body>
</html>
