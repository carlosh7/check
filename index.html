<!DOCTYPE html>
<html lang="es" class="dark bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check | Gestión de Eventos Elite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <style>
        /* FIX: Visibilidad del icono del calendario en dark mode */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(0.9);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                primary: { DEFAULT: '#7c3aed', light: '#a78bfa', dark: '#5b21b6' },
                slate: { 850: '#1e293b', 950: '#020617' }
              },
              fontFamily: {
                sans: ['Plus Jakarta Sans', 'sans-serif'],
                display: ['Manrope', 'sans-serif']
              },
              backgroundImage: {
                'gradient-premium': 'radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.1) 0%, transparent 50%)',
              }
            }
          }
        }
    </script>
    <script>
        // Inicializar tema antes de cargar
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            if (saved === 'light') {
                document.documentElement.classList.add('light');
            } else {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body class="bg-slate-950 text-slate-50 antialiased font-sans flex flex-col min-h-screen">

    <!-- LOADING SCREEN: Cubre todo hasta que JS decide qué mostrar -->
    <div id="loading-screen" style="position:fixed;inset:0;background:#020617;z-index:999999;display:flex;align-items:center;justify-content:center"><div style="width:48px;height:48px;border:4px solid rgba(124,58,237,0.3);border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite"></div></div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>document.getElementById('loading-screen').style.display='none'</script>

    <!-- REGISTRO PÚBLICO MOVIDO A registro.html (Aislamiento V10.3) -->

    <!-- VIEW: LOGIN -->
    <div id="view-login" class="fixed inset-0 bg-slate-950 p-4 md:p-6 animate-fade z-[9999] overflow-y-auto flex items-start md:items-center justify-center">
        <div class="w-full max-w-md">
            <div class="glass-card p-12 rounded-[48px] border border-white/10 shadow-2xl">
                <div class="flex flex-col items-center mb-10">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-14 h-14 bg-primary/15 rounded-2xl border border-primary/25 flex items-center justify-center shadow-xl shadow-primary/15">
                            <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1, 'wght' 700;">verified_user</span>
                        </div>
                    </div>
                    <div class="text-center">
                        <span class="font-black font-display text-4xl tracking-tight text-white">Check<span class="text-primary italic">.</span></span>
                    </div>
                    <p class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px] mt-1">Event Attendance</p>
                </div>
                <form id="login-form" class="space-y-5">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-4 text-slate-500">person</span>
                        <input type="text" id="login-user" required placeholder="Usuario" class="input-field !pl-12 bg-slate-900/50">
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-4 text-slate-500">lock</span>
                        <input type="password" id="login-pass" required placeholder="Contraseña" class="input-field !pl-12 bg-slate-900/50">
                    </div>
                    <button type="submit" class="btn-primary w-full py-4 rounded-2xl shadow-lg shadow-primary/20 font-bold uppercase tracking-widest">Ingresar</button>
                    <div class="text-center mt-4">
                        <a href="#" id="go-to-signup" class="text-primary text-xs font-bold hover:underline">¿No tienes cuenta? Solicita una</a>
                    </div>
                </form>
                <form id="signup-form" class="hidden space-y-5">
                    <h3 class="text-lg font-black text-center mb-6">Solicitar Acceso</h3>
                    <input type="text" id="signup-user" required placeholder="Correo / Usuario" class="input-field bg-slate-900/50">
                    <input type="password" id="signup-pass" required placeholder="Contraseña" class="input-field bg-slate-900/50">
                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold uppercase tracking-widest">Enviar Solicitud</button>
                    <button id="go-to-login" type="button" class="w-full text-xs font-bold text-slate-500 mt-2 hover:text-white transition-colors">Ya tengo cuenta → Ingresar</button>
                </form>
            </div>
            <!-- LINKS LEGALES DEL LOGIN -->
            <div class="flex justify-center gap-6 mt-8">
                <button id="btn-open-policy" class="text-[11px] text-slate-600 hover:text-primary transition-colors uppercase tracking-widest font-bold">Política de Datos</button>
                <span class="text-slate-700">·</span>
                <button id="btn-open-terms" class="text-[11px] text-slate-600 hover:text-primary transition-colors uppercase tracking-widest font-bold">Términos de Uso</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
