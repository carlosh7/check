<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Attendance</title>
    <link rel="stylesheet" href="/styles.css?v=12.2.3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="modern.css?v=13.0.2">
</head>

<body class="antialiased">

    <!-- VIEW: LOGIN -->
    <div id="view-login" class="fixed inset-0 flex items-center justify-center p-6 bg-[var(--bg-app)]">
        <div class="w-full max-w-[340px]">
            <div class="card p-8">
                <div class="flex flex-col items-center mb-8">
                    <div class="w-11 h-11 bg-[var(--primary)] rounded-xl flex items-center justify-center mb-4">
                        <span class="material-symbols-outlined text-white text-2xl">verified_user</span>
                    </div>
                    <h1 class="text-2xl font-semibold tracking-tight">Check<span class="text-[var(--primary)]">.</span></h1>
                    <p class="text-[var(--text-secondary)] text-xs uppercase tracking-widest font-medium mt-1">Attendance Management</p>
                </div>

                <form id="login-form" class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-medium text-[var(--text-secondary)] uppercase tracking-wider ml-1">Usuario</label>
                        <input type="text" id="login-user" required placeholder="nombre@empresa.com" class="input-field w-full">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-medium text-[var(--text-secondary)] uppercase tracking-wider ml-1">Contraseña</label>
                        <input type="password" id="login-pass" required placeholder="••••••••" class="input-field w-full">
                    </div>
                    <button type="submit" class="btn-primary w-full py-2.5 mt-4">Iniciar Sesión</button>
                    <div class="text-center pt-2">
                        <a href="#" id="go-to-signup" class="text-[var(--primary)] text-xs font-medium hover:underline">Solicitar acceso</a>
                    </div>
                </form>

                <form id="signup-form" class="hidden space-y-4">
                    <h2 class="text-center text-lg font-semibold mb-4">Solicitar Acceso</h2>
                    <input type="text" id="signup-user" required placeholder="Correo" class="input-field w-full">
                    <input type="password" id="signup-pass" required placeholder="Contraseña Sugerida" class="input-field w-full">
                    <button type="submit" class="btn-primary w-full py-2.5">Enviar Solicitud</button>
                    <button id="go-to-login" type="button" class="w-full text-xs text-[var(--text-secondary)] mt-2 hover:text-[var(--text-main)] transition-colors text-center">Volver al login</button>
                </form>
            </div>
            
            <div class="flex justify-center gap-8 mt-6">
                <button id="btn-open-policy" class="text-[10px] text-[var(--text-secondary)] hover:text-[var(--primary)] transition-colors uppercase tracking-widest font-medium">Privacidad</button>
                <button id="btn-open-terms" class="text-[10px] text-[var(--text-secondary)] hover:text-[var(--primary)] transition-colors uppercase tracking-widest font-medium">Términos</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <script type="module" src="/script.js?v=12.2.3"></script>
</body>
</html>
