<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Check Elite Pro - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✓</text></svg>">
    <style>
        /* Estilos críticos para prevenir FOUC */
        html.dark {
            --bg-app: #202124;
            --bg-sidebar: #292a2d;
            --bg-card: #292a2d;
            --bg-input: #35363a;
            --bg-hover: #3c4043;
            --bg-active: #4a4d51;
            --primary: #8ab4f8;
            --primary-hover: #aecbfa;
            --primary-light: rgba(138, 180, 248, 0.15);
            --text-main: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-muted: #80868b;
            --border: #3c4043;
            --border-light: #303134;
            --border-focus: rgba(138, 180, 248, 0.5);
            --bg-card-rgb: 41, 42, 45;
        }
        
        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        #view-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-app);
        }
    </style>
    <link rel="stylesheet" href="/css/styles.css?v=12.28.22">
    <link rel="stylesheet" href="/css/modern.css?v=12.28.22">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body class="antialiased">

    <!-- VIEW: LOGIN (oculto por defecto, se muestra solo si no hay sesión) -->
    <div id="view-login" class="fixed inset-0 flex items-center justify-center p-6 bg-[var(--bg-app)] hidden">
        <!-- Fondo decorativo sutil -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-20">
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
        </div>

        <div class="glass-card w-full max-w-md p-10 relative z-10 border border-white/10 shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-6 shadow-inner">
                    <span class="material-symbols-outlined text-primary text-4xl">verified_user</span>
                </div>
                <h2 class="text-3xl font-black text-white tracking-tight leading-tight">Bienvenido a Check<span class="text-primary italic">.</span></h2>
                <p class="text-sm text-[var(--text-secondary)] font-bold uppercase tracking-[0.2em] mt-3">Sistema de Registro Elite</p>
            </div>

            <form id="form-login" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-[var(--text-secondary)] uppercase tracking-wider ml-1">Email Corporativo</label>
                    <input type="email" id="login-email" required class="w-full bg-[var(--bg-input)] text-[var(--text-main)] text-base rounded-xl px-5 py-3.5 border border-[var(--border)] focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-light)] outline-none transition-all placeholder:text-[var(--text-muted)]" placeholder="admin@check.com">
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-[var(--text-secondary)] uppercase tracking-wider ml-1">Contraseña</label>
                    <input type="password" id="login-password" required class="w-full bg-[var(--bg-input)] text-[var(--text-main)] text-base rounded-xl px-5 py-3.5 border border-[var(--border)] focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary-light)] outline-none transition-all placeholder:text-[var(--text-muted)]" placeholder="••••••••">
                </div>
                
                <button type="submit" class="w-full py-3.5 bg-[var(--primary)] text-[var(--text-inverse)] font-bold text-sm rounded-xl shadow-lg shadow-[var(--primary)]/20 hover:bg-[var(--primary-hover)] hover:shadow-xl hover:shadow-[var(--primary)]/30 active:scale-[0.98] transition-all uppercase tracking-wider mt-4">Entrar al Panel</button>
            </form>

            <div class="mt-8 pt-8 border-t border-[var(--border)] flex flex-col items-center gap-3">
                <a href="https://smarteventos.co/" target="_blank" rel="noopener noreferrer" class="text-xs text-[var(--primary)] hover:opacity-80 transition-opacity uppercase tracking-wider font-bold">
                    Powered by Smart Eventos
                </a>
                <div class="flex items-center gap-4">
                    <p class="text-xs text-[var(--text-muted)] font-bold uppercase tracking-wider">&copy; 2026 Check Pro</p>
                    <span id="login-version-display" class="text-xs text-[var(--text-muted)] font-bold app-version-text">v12.28.22</span>
                </div>
                <button id="btn-open-terms" class="text-xs text-[var(--text-muted)] hover:text-[var(--primary)] transition-colors uppercase tracking-wider font-bold">Términos y Privacidad</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <script type="module">
        // Sistema anti-caché avanzado V12.28.15
        (function() {
            // Sistema anti-caché NUCLEAR V12.28.22
            const currentVersion = '12.28.22';
            
            // 1. Limpieza total inicial
            const urlParams = new URLSearchParams(window.location.search);
            const urlVersion = urlParams.get('v');
            
            // Si la versión en URL no coincide, limpiar TODO
            if (urlVersion && urlVersion !== currentVersion) {
                console.warn(`[CACHE NUCLEAR] URL version ${urlVersion} ≠ current ${currentVersion}, nuclear cleanup...`);
                localStorage.clear();
                sessionStorage.clear();
                indexedDB.databases().then(dbs => {
                    dbs.forEach(db => indexedDB.deleteDatabase(db.name));
                }).catch(() => {});
                
                // Forzar recarga con versión correcta
                window.location.href = `/?nuclear_clean=${Date.now()}&v=${currentVersion}`;
                return;
            }
            
            // 2. Verificar caché persistente del navegador
            const checkBrowserCache = () => {
                // Crear un iframe para bypass cache
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = `/js/app.js?cache_test=${Date.now()}`;
                document.body.appendChild(iframe);
                
                setTimeout(() => {
                    document.body.removeChild(iframe);
                }, 100);
            };
            
            // 3. Cargar script con múltiples técnicas anti-caché
            const loadScript = () => {
                // Técnica 1: Crear script con timestamp único
                const timestamp = Date.now();
                const script = document.createElement('script');
                script.type = 'module';
                
                // Técnica 2: Usar múltiples parámetros para evitar caché
                script.src = `/js/app.js?v=${currentVersion}&t=${timestamp}&r=${Math.random()}&_=${timestamp}`;
                
                // Técnica 3: Forzar no-cache headers
                script.setAttribute('cache', 'no-store');
                script.setAttribute('pragma', 'no-cache');
                
                script.onload = function() {
                    console.log(`[CACHE] Successfully loaded version ${currentVersion}`);
                    localStorage.setItem('check_loaded_version', currentVersion);
                    localStorage.setItem('check_last_load', timestamp.toString());
                };
                
                script.onerror = function() {
                    console.error(`[CACHE] Failed to load app.js, attempting cache bust...`);
                    // Intentar con URL diferente
                    script.src = `/js/app.js?force=${timestamp}&v=${currentVersion}`;
                };
                
                document.head.appendChild(script);
                checkBrowserCache();
            };
            
            // 4. Verificar si ya cargamos recientemente
            const lastLoad = localStorage.getItem('check_last_load');
            const loadedVersion = localStorage.getItem('check_loaded_version');
            
            if (lastLoad && (Date.now() - parseInt(lastLoad)) < 5000 && loadedVersion === currentVersion) {
                console.log(`[CACHE] Recently loaded version ${currentVersion}, skipping...`);
            } else {
                loadScript();
            }
            
            // 5. Forzar recarga si detectamos versión antigua después de 2 segundos
            setTimeout(() => {
                if (!localStorage.getItem('check_loaded_version') || 
                    localStorage.getItem('check_loaded_version') !== currentVersion) {
                    console.warn(`[CACHE TIMEOUT] Version mismatch after timeout, forcing reload...`);
                    window.location.href = `/?timeout_reload=${Date.now()}&v=${currentVersion}`;
                }
            }, 2000);
        })();
    </script>

</body>
</html>
