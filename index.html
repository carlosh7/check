<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="/css/modules/base.css?v=12.44.783">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: var(--space-4);
      background: var(--bg-app);
    }
    .login-container {
      width: 100%; max-width: 360px;
    }
    .login-logo {
      display: flex; align-items: center; gap: var(--space-3);
      margin-bottom: var(--space-8); justify-content: center;
    }
    .login-logo-icon {
      width: 40px; height: 40px; border-radius: var(--radius-lg);
      background: var(--accent); display: flex; align-items: center; justify-content: center;
    }
    .login-logo-icon .material-symbols-outlined { font-size: 22px; color: #fff; }
    .login-logo-text { font-size: var(--text-xl); font-weight: 700; color: var(--text-primary); }
    .login-logo-text span { color: var(--accent); }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border-card);
      border-radius: var(--radius-xl); padding: var(--space-8);
    }
    .login-title { font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-1); text-align: center; }
    .login-subtitle { font-size: var(--text-sm); color: var(--text-muted); margin-bottom: var(--space-6); text-align: center; }
    .login-form { display: flex; flex-direction: column; gap: var(--space-4); }
    .login-error {
      padding: var(--space-3); background: var(--error-bg); color: var(--error);
      border-radius: var(--radius-md); font-size: var(--text-sm); display: none;
    }
    .login-footer { text-align: center; margin-top: var(--space-6); }
    .login-footer a { font-size: var(--text-sm); color: var(--text-muted); }
    .login-footer a:hover { color: var(--accent); }
    .login-loading { display: none; }
    .login-loading.active { display: flex; }
    .login-loading .spinner { margin: 0 auto; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="login-logo-icon">
        <span class="material-symbols-outlined">verified_user</span>
      </div>
      <div class="login-logo-text">Check<span>.</span></div>
    </div>

    <div class="login-card">
      <h1 class="login-title">Bienvenido de vuelta</h1>
      <p class="login-subtitle">Ingresa tus credenciales para acceder</p>

      <div id="login-error" class="login-error"></div>

      <form id="login-form" class="login-form" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="input" placeholder="admin@check.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-lg w-full">
          Ingresar
        </button>
      </form>

      <div id="login-loading" class="login-loading">
        <div class="spinner"></div>
      </div>
    </div>

    <div class="login-footer">
      <a href="#" id="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <script src="/js/app.js?v=12.44.783"></script>
</body>
</html>
