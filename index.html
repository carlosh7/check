<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Check Elite Pro - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✓</text></svg>">
    <style>
        /* Estilos críticos para prevenir FOUC */
        html.dark {
            --bg-app: #121212;
            --bg-sidebar: rgba(18, 18, 18, 0.8);
            --bg-card: rgba(30, 30, 30, 0.6);
            --bg-input: rgba(40, 40, 40, 0.4);
            --bg-hover: rgba(139, 92, 246, 0.1);
            --bg-active: rgba(139, 92, 246, 0.15);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-light: rgba(139, 92, 246, 0.15);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.04);
            --border-focus: rgba(139, 92, 246, 0.4);
            --bg-card-rgb: 2, 6, 23;
        }
        
        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        #view-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-app);
        }
        
        /* Anti-FOUC: Ocultar contenido hasta que app cargue */
        body:not(.app-loaded) #app-container {
            display: none !important;
        }
        body:not(.app-loaded) #view-login {
            display: flex !important;
        }
        body.app-loaded {
            opacity: 1 !important;
        }
        body.app-loaded {
            opacity: 1 !important;
        }
    </style>
    <!-- ANTI-FOUC CRÍTICO: Ejecutar ANTES de renderizar body -->
    <script>
        (function() {
            // Remover clase app-loaded al inicio para anti-FOUC
            document.documentElement.classList.remove('app-loaded');
            try {
                var savedUser = localStorage.getItem('user');
                if (savedUser && savedUser !== 'undefined' && savedUser !== 'null') {
                    var user = JSON.parse(savedUser);
                    if (user && (user.userId || user.token)) {
                        document.write('<style>#view-login{display:none!important;visibility:hidden!important;}</style>');
                    }
                }
            } catch(e) {}
        })();
    </script>
    <link rel="stylesheet" href="/css/styles.css?v=12.44.85">
    <link rel="stylesheet" href="/css/modern.css?v=12.44.85">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
</head>

<body class="antialiased" style="opacity:0;">

    <!-- VIEW: LOGIN (oculto por defecto, se muestra solo si no hay sesión) -->
    <div id="view-login" class="fixed inset-0 flex items-center justify-center p-6 bg-[#020617] overflow-hidden">
        <!-- Blobs Decorativos Premium (v12.34.0) -->
        <div class="blur-glow w-[500px] h-[500px] bg-violet-600/30 -top-48 -left-48 animate-delay-1000"></div>
        <div class="blur-glow w-[400px] h-[400px] bg-blue-600/20 bottom-10 -right-20"></div>
        <div class="blur-glow w-[350px] h-[350px] bg-fuchsia-600/10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>

        <div class="glass-card w-full max-w-md p-10 relative z-10 border border-white/5 shadow-2xl backdrop-blur-3xl bg-white/[0.03]">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-violet-500/20 to-blue-500/20 rounded-3xl mb-6 shadow-xl border border-white/10 group overflow-hidden relative">
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                    <span class="material-symbols-outlined text-transparent bg-clip-text bg-gradient-to-br from-violet-400 to-blue-400 text-5xl">verified_user</span>
                </div>
                <h2 class="text-3xl font-black text-white tracking-tight leading-tight">Check<span class="text-violet-500 italic">.</span> Pro</h2>
                <div class="flex items-center justify-center gap-2 mt-3">
                    <span class="h-[1px] w-4 bg-violet-500/50"></span>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em]">Sistema de Registro Elite</p>
                    <span class="h-[1px] w-4 bg-blue-500/50"></span>
                </div>
            </div>

            <form id="form-login" class="space-y-6">
                <div class="group space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 transition-colors group-focus-within:text-violet-400">Email Corporativo</label>
                     <div class="relative">
                         <input type="email" id="login-email" required 
                                class="w-full bg-slate-900/50 text-white text-sm rounded-2xl pl-5 pr-12 py-4 border border-white/5 focus:border-violet-500/50 focus:ring-4 focus:ring-violet-500/10 outline-none transition-all placeholder:text-slate-600" 
                                placeholder="tu@empresa.com">
                         <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl group-focus-within:text-violet-400 transition-colors">mail</span>
                    </div>
                </div>
                <div class="group space-y-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 transition-colors group-focus-within:text-violet-400">Código de Acceso</label>
                     <div class="relative">
                         <input type="password" id="login-password" required 
                                class="w-full bg-slate-900/50 text-white text-sm rounded-2xl pl-5 pr-12 py-4 border border-white/5 focus:border-violet-500/50 focus:ring-4 focus:ring-violet-500/10 outline-none transition-all placeholder:text-slate-600" 
                                placeholder="••••••••">
                         <button type="button" onclick="document.getElementById('login-password').type = document.getElementById('login-password').type === 'password' ? 'text' : 'password'" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                             <span class="material-symbols-outlined text-xl" id="toggle-password-icon">visibility</span>
                         </button>
                     </div>
                </div>
                
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-violet-600 to-blue-600 text-white font-black text-xs rounded-2xl shadow-xl shadow-violet-900/20 hover:shadow-violet-600/40 hover:scale-[1.02] active:scale-[0.98] transition-all uppercase tracking-[0.2em] mt-4 relative overflow-hidden group">
                    <span class="relative z-10">Entrar al Ecosistema</span>
                    <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 flex flex-col items-center gap-4">
                <a href="https://smarteventos.co/" target="_blank" rel="noopener noreferrer" class="group flex items-center gap-2 text-[11px] text-slate-500 hover:text-white transition-colors font-bold">
                    Powered By <span class="text-violet-400 group-hover:text-blue-400">Smart Eventos</span>
                </a>
                <div class="flex items-center gap-6">
                    <p class="text-[11px] text-slate-600 font-bold">&copy; 2026 Check Pro</p>
                    <div class="flex items-center gap-2 bg-white/5 px-5 py-2 rounded-full border border-white/5 animate-pulse">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <span id="login-version-display" class="text-[11px] text-slate-400 font-black app-version-text">v12.44.64</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Quill 2.0.2 - Misma versión que usa lazyLoad.loadQuill() -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    
    <script type="module">
        (function() {
            const currentVersion = '12.44.65';
            
            // 1. FORZAR recarga si hay cualquier parámetro de cache bust
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('force_reload') || urlParams.has('clean_all') || 
                urlParams.has('nuclear_clean') || urlParams.has('timeout_reload')) {
                
                // Limpiar TODO
                localStorage.clear();
                sessionStorage.clear();
                
                // Redirigir a URL limpia - FORZAR RECARGA
                const cleanUrl = window.location.pathname + '?v=' + currentVersion + '&_=' + Date.now() + '&force=' + Date.now();
                window.location.replace(cleanUrl);
                return;
            }
            
            // 2. CARGAR script con método DIRECTO
            const script = document.createElement('script');
            script.type = 'module';
            
            // URL con timestamp ÚNICO para cada carga - FORZAR RECARGA COMPLETA
            const uniqueId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const forceReload = 'force_' + Date.now();
            const cacheBuster = 'nocache_' + Math.random().toString(36).substr(2, 10);
            script.src = `/js/app.js?v=${currentVersion}&_=${uniqueId}&force=${forceReload}&cb=${cacheBuster}`;
            
            // Forzar no-cache con múltiples headers
            script.setAttribute('cache', 'no-store');
            script.setAttribute('no-cache', 'true');
            script.setAttribute('Pragma', 'no-cache');
            script.setAttribute('pragma', 'no-cache');
            
            script.onload = function() {
                console.log(`✅ Loaded version ${currentVersion} successfully`);
                localStorage.setItem('check_version', currentVersion);
                localStorage.setItem('check_load_time', Date.now().toString());
            };
            
            script.onerror = function() {
                console.error(`❌ Failed to load app.js, forcing reload...`);
                // Recargar página completa
                window.location.href = `/?force_reload=${Date.now()}&v=${currentVersion}`;
            };
            
            // 3. Insertar script AL PRINCIPIO del head
            document.head.insertBefore(script, document.head.firstChild);
            
            // 4. Verificar después de 1 segundo si se cargó correctamente
            setTimeout(() => {
                if (!localStorage.getItem('check_version') || 
                    localStorage.getItem('check_version') !== currentVersion) {
                    console.warn(`⚠️ Version check failed, forcing reload...`);
                    window.location.href = `/?force_reload=${Date.now()}&v=${currentVersion}`;
                }
            }, 1000);
        })();
    </script>

</body>
</html>
