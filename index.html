<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check | Gestión de Eventos Premium</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo-section" id="logo-trigger">
                <div class="logo-placeholder">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M20 6L9 17L4 12" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2 id="app-title">Check</h2>
            </div>
            <div class="nav-actions">
                <button class="btn" id="theme-btn">🌓</button>
                <button class="btn btn-primary" id="login-nav-btn">Admin</button>
            </div>
        </nav>

        <!-- PUBLIC VIEW: Registration & Countdown -->
        <main id="view-registration" class="view">
            <header class="hero-section" style="text-align: center; margin-bottom: 3rem;">
                <div id="event-logo-container" style="margin-bottom: 1.5rem;">
                    <!-- Logo del evento se inyectará aquí -->
                </div>
                <h1 id="event-name-display">Cargando evento...</h1>
                <p id="event-desc-display">Obteniendo detalles del evento...</p>
                
                <div class="timer-container">
                    <div id="current-clock" class="clock">00:00:00</div>
                    <div id="countdown-timer" class="countdown">Inicia en: --:--:--</div>
                </div>
            </header>

            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <form id="public-reg-form">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="reg-name" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="reg-email" placeholder="email@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="reg-phone" placeholder="+52 ...">
                    </div>
                    <div class="form-group">
                        <label>Organización</label>
                        <input type="text" id="reg-org" placeholder="Nombre de tu empresa">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Confirmar Registro</button>
                </form>
            </div>
        </main>

        <!-- LOGIN VIEW -->
        <section id="view-login" class="view hidden">
            <div class="card" style="max-width: 400px; margin: 4rem auto;">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Panel Administrativo</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" id="login-user" value="admin" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="login-pass" value="admin123" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Entrar</button>
                    <button type="button" class="btn" id="back-to-reg" style="width: 100%; margin-top: 1rem; justify-content: center;">Volver</button>
                </form>
            </div>
        </section>

        <!-- ADMIN DASHBOARD VIEW -->
        <section id="view-admin" class="view hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Dashboard</h1>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn" id="btn-new-event">+ Nuevo Evento</button>
                    <button class="btn btn-primary" id="btn-logout">Cerrar Sesión</button>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="stat-card">
                    <p>Total Registrados</p>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <p>Asistencia</p>
                    <div class="stat-value" id="stat-presence">0%</div>
                </div>
                <div class="stat-card">
                    <p>Faltantes</p>
                    <div class="stat-value" id="stat-missing" style="color: #FF3B30;">0</div>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3>Gestión de Asistentes</h3>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn" id="btn-import-trigger">📂 Importar Excel</button>
                        <input type="file" id="admin-file-import" hidden accept=".xlsx, .xls, .csv">
                        <button class="btn" id="btn-export-pdf">📄 Generar Reporte PDF</button>
                        <button class="btn" id="btn-export-excel">📊 Exportar Excel</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="guests-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Organización</th>
                                <th>Estado</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="guests-tbody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- CREATE EVENT MODAL (Simulado con hidden) -->
        <div id="modal-event" class="view hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center;">
            <div class="card" style="width: 100%; max-width: 500px;">
                <h2>Crear Nuevo Evento</h2>
                <form id="new-event-form" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Nombre del Evento</label>
                        <input type="text" id="ev-name" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha y Hora de Inicio</label>
                        <input type="datetime-local" id="ev-date" required>
                    </div>
                    <div class="form-group">
                        <label>Ubicación</label>
                        <input type="text" id="ev-location">
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="ev-desc" style="width: 100%; border-radius: var(--radius-md); padding: 1rem; border: 1px solid var(--outline); background: var(--bg); color: var(--text);"></textarea>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Guardar</button>
                        <button type="button" class="btn" id="close-modal" style="flex: 1; justify-content: center;">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
