version: '3.8'

services:
  check-app:
    image: node:20-slim
    container_name: check-app-stack
    ports:
      - "3000:3000"
    volumes:
      - /home/data_check:/usr/src/app/persistence
    environment:
      - NODE_ENV=production
      - DATA_PATH=/usr/src/app/persistence
    # MÉTODO DE PRODUCCIÓN SEGURO: Versión v12.44.346 (Debug guests.routes)
    entrypoint: []
    command: >
      sh -c "
      echo '🛡️ [INIT] Iniciando Check Pro v12.44.341...' &&
      apt-get update && apt-get install -y git rsync &&
      echo '📂 [DIRS] Creando estructura de datos...' &&
      mkdir -p /usr/src/app/persistence/system /usr/src/app/persistence/events /usr/src/app/persistence/uploads &&
      chmod -R 777 /usr/src/app/persistence &&
      echo '✓ Directorios creados: /system, /events, /uploads' &&
      rm -rf /tmp/app_new &&
      git clone https://github.com/carlosh7/check.git /tmp/app_new &&
      echo '📂 [SYNC] Sincronizando código con rsync (protegiendo datos)...' &&
      rsync -av --exclude=persistence --exclude=data --exclude=databases --exclude=uploads --exclude=.git /tmp/app_new/. /usr/src/app/ &&
      rm -rf /tmp/app_new &&
      cd /usr/src/app &&
      npm install --omit=dev &&
      echo '🚀 [START] Arrancando servidor...' &&
      npm start"
    restart: always
