version: '3.8'

services:
  check-app:
    image: node:20-slim
    container_name: check-app-stack
    ports:
      - "3000:3000"
    volumes:
      - /home/data_check:/usr/src/app/persistence
    environment:
      - NODE_ENV=production
      - DATA_PATH=/usr/src/app/persistence
    # MÉTODO DE PRODUCCIÓN SEGURO: El contenedor descarga su propio código de GitHub al arrancar
    command: >
      sh -c "
      apt-get update && apt-get install -y git &&
      mkdir -p /usr/src/app &&
      rm -rf /tmp/app_new &&
      git clone https://github.com/carlosh7/check.git /tmp/app_new &&
      cp -ru /tmp/app_new/. /usr/src/app/ &&
      rm -rf /tmp/app_new &&
      cd /usr/src/app &&
      npm install --omit=dev &&
      npm start"
    restart: always
