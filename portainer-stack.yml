version: '3.8'

services:
  check-app:
    image: node:20-slim
    container_name: check-app-stack
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    volumes:
      - /home/data_check:/usr/src/app/persistence
    environment:
      - NODE_ENV=production
      - DATA_PATH=/usr/src/app/persistence
    restart: always
