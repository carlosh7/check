version: '3.8'

services:
  check-app:
    image: node:20-slim
    container_name: check-app-stack
    ports:
      - "3000:3000"
    volumes:
      - /home/data_check:/usr/src/app/persistence
    environment:
      - NODE_ENV=production
      - DATA_PATH=/usr/src/app/persistence
    # MÉTODO DE PRODUCCIÓN SEGURO: Versión v12.44.331 (Advanced Diagnostics)
    entrypoint: []
    command: >
      sh -c "
      echo '🔍 [DIAGNOSTIC] Iniciando contenedor Check Pro v12.44.331...' &&
      apt-get update && apt-get install -y git &&
      mkdir -p /usr/src/app &&
      rm -rf /tmp/app_new &&
      git clone https://github.com/carlosh7/check.git /tmp/app_new &&
      cp -ru /tmp/app_new/. /usr/src/app/ &&
      rm -rf /tmp/app_new &&
      cd /usr/src/app &&
      echo '🔧 [AUTO-CONFIG] Configurando persistencia...' &&
      mkdir -p /usr/src/app/persistence/events /usr/src/app/persistence/uploads &&
      chmod -R 777 /usr/src/app/persistence &&
      echo '📝 [TEST] Verificando escritura en persistencia...' &&
      touch /usr/src/app/persistence/WRITE_TEST &&
      [ -f /usr/src/app/persistence/WRITE_TEST ] && echo '✅ [TEST] Escritura en volumen EXITOSA.' || echo '❌ [TEST] FALLO CRÍTICO: El volumen no permite escritura.' &&
      npm install --omit=dev &&
      npm start"
    restart: always
