version: '3.8'

services:
  check-app:
    image: 'node:20-alpine'
    container_name: check-app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Para desarrollo local - agregar IP según sea necesario
      # Ejemplo: ALLOWED_ORIGINS=http://localhost:3000,http://192.168.1.100:3000
      # Para producción con dominio: eliminar arriba y usar:
      # - ALLOWED_ORIGINS=http://tusitio.com,https://tusitio.com
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    volumes:
      - /home/data_check:/usr/src/app/persistence
    environment:
      - NODE_ENV=development
      - DATA_PATH=/usr/src/app/persistence
    networks:
      - check-network
    entrypoint: []
    command: >
      sh -c "
      echo 'Init...' &&
      apt-get update && apt-get install -y git rsync &&
      mkdir -p /usr/src/app/persistence/system /usr/src/app/persistence/events /usr/src/app/persistence/uploads &&
      chmod -R 777 /usr/src/app/persistence &&
      rm -rf /tmp/app_new &&
      git clone --depth 1 https://github.com/carlosh7/check.git /tmp/app_new &&
      rsync -av /tmp/app_new/. /usr/src/app/ &&
      rm -rf /tmp/app_new &&
      cd /usr/src/app &&
      npm install --omit=dev &&
      npm start"
    restart: always

  proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - /home/data_check/nginx/data:/data
      - /home/data_check/nginx/letsencrypt:/etc/letsencrypt
    networks:
      - check-network

networks:
  check-network:
    driver: bridge

