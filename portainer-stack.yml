version: '3.8'

services:
  check-app:
    image: node:20-slim
    container_name: check-app-stack
    ports:
      - "3000:3000"
    volumes:
      - /home/data_check:/usr/src/app/persistence
    environment:
      - NODE_ENV=production
      - DATA_PATH=/usr/src/app/persistence
    # MÉTODO DE PRODUCCIÓN SEGURO: Versión v12.44.331 (Advanced Diagnostics)
    entrypoint: []
    command: >
      sh -c "
      echo '🛡️ [HARDENING] Iniciando Check Pro v12.44.337 con persistencia blindada...' &&
      apt-get update && apt-get install -y git &&
      mkdir -p /usr/src/app/persistence/events /usr/src/app/persistence/uploads &&
      chmod -R 777 /usr/src/app/persistence &&
      rm -rf /tmp/app_new &&
      git clone https://github.com/carlosh7/check.git /tmp/app_new &&
      echo '📂 [SYNC] Sincronizando código (protegiendo datos)...' &&
      cp -rv /tmp/app_new/. /usr/src/app/ --exclude=persistence --exclude=data --exclude=databases --exclude=uploads || 
      (cd /tmp/app_new && find . -maxdepth 1 ! -name 'persistence' ! -name 'data' ! -name 'databases' ! -name 'uploads' -exec cp -ru {} /usr/src/app/ \;) &&
      rm -rf /tmp/app_new &&
      cd /usr/src/app &&
      npm install --omit=dev &&
      echo '🚀 [START] Arrancando servidor...' &&
      npm start"
    restart: always
