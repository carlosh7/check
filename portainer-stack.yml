# INSTRUCCIONES:
# 1. Reemplaza TOKEN_AQUI con tu Personal Access Token de GitHub.
#    El token debe tener permisos: Contents (Read-only) para ambos repos:
#    - carlosh7/check
#    - carlosh7/check-3d-planner
# 2. Ambos repos son privados. Usa el mismo TOKEN_AQUI para los dos clones.
# 3. Pegar en Portainer y desplegar.

version: '3.8'

services:
  # ─── Check App (Express + SQLite) ───
  check-app:
    image: node:20-slim
    container_name: check-app
    restart: always
    ports:
      - '3000:3000'
    expose:
      - '3000'
    volumes:
      - /home/data_check:/usr/src/app/persistence
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_PATH=/usr/src/app/persistence
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy-network
    entrypoint: []
    command: >
      sh -c "
      echo '=== check-app deploy ===' &&
      apt-get update && apt-get install -y git rsync ca-certificates &&
      mkdir -p /usr/src/app/persistence/system /usr/src/app/persistence/events /usr/src/app/persistence/uploads &&
      chmod -R 777 /usr/src/app/persistence &&
      rm -rf /tmp/app_new &&
      git clone --depth 1 https://x-access-token:TOKEN_AQUI@github.com/carlosh7/check.git /tmp/app_new &&
      rsync -av /tmp/app_new/. /usr/src/app/ &&
      rm -rf /tmp/app_new &&
      cd /usr/src/app &&
      npm install --omit=dev &&
      npm start"

  # ─── Check 3D Planner (React + Three.js + nginx) ───
  check-3d-planner:
    image: node:20-slim
    container_name: check-3d-planner
    restart: always
    ports:
      - '3001:3001'
    expose:
      - '3001'
    networks:
      - proxy-network
    entrypoint: []
    command: >
      sh -c "
      echo '=== check-3d-planner deploy ===' &&
      apt-get update -qq &&
      apt-get install -y -qq --no-install-recommends git rsync nginx curl ca-certificates &&
      rm -rf /var/lib/apt/lists/* &&
      rm -rf /tmp/app_new &&
      git clone --depth 1 https://x-access-token:TOKEN_AQUI@github.com/carlosh7/check-3d-planner.git /tmp/app_new &&
      rsync -av /tmp/app_new/. /app/ &&
      rm -rf /tmp/app_new &&
      cd /app &&
      npm ci &&
      npm run build &&
      echo '=== Build complete, starting nginx ===' &&
      mkdir -p /usr/share/nginx/html &&
      cp -r dist/* /usr/share/nginx/html/ &&
      cp nginx.conf /etc/nginx/conf.d/default.conf 2>/dev/null || true &&
      nginx -g 'daemon off;'
      "

networks:
  proxy-network:
    name: proxy-network
    driver: bridge
