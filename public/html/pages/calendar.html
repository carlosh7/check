<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario - Check Pro</title>
<link rel="stylesheet" href="/css/main.css">
<style>
body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
.cal-container { max-width: 1100px; margin: 0 auto; padding: 24px; }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.cal-header h1 { font-size: 1.5rem; font-weight: 700; }
.cal-nav { display: flex; gap: 8px; align-items: center; }
.cal-nav button { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
.cal-nav button:hover { background: #334155; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #1e293b; border-radius: 12px; overflow: hidden; }
.cal-day { background: #0f172a; min-height: 120px; padding: 8px; cursor: pointer; }
.cal-day:hover { background: #1a2332; }
.cal-day.other-month { opacity: 0.3; }
.cal-day.today { border: 1px solid #3b82f6; }
.cal-day .day-num { font-size: 0.8rem; color: #94a3b8; margin-bottom: 4px; }
.cal-day .event-chip { background: #1e40af; color: #93c5fd; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.cal-day .event-chip:hover { background: #1e4bd2; }
.cal-day .event-chip .count { color: #60a5fa; }
.weekday { background: #1e293b; padding: 10px; text-align: center; font-size: 0.8rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
</style>
</head>
<body>
<div class="cal-container">
  <div class="cal-header">
    <h1 id="cal-title">Calendario</h1>
    <div class="cal-nav">
      <button onclick="prevMonth()">◀</button>
      <span id="cal-month-label" style="min-width:120px;text-align:center;font-weight:600"></span>
      <button onclick="nextMonth()">▶</button>
    </div>
  </div>
  <div id="cal-stats" style="margin-bottom:16px;display:flex;gap:16px;font-size:0.9rem;color:#94a3b8"></div>
  <div class="cal-grid" id="cal-grid">
    <div class="weekday">Dom</div><div class="weekday">Lun</div><div class="weekday">Mar</div>
    <div class="weekday">Mie</div><div class="weekday">Jue</div><div class="weekday">Vie</div><div class="weekday">Sab</div>
  </div>
</div>
<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let currentYear, currentMonth;

async function loadCalendar(year, month) {
  currentYear = year; currentMonth = month;
  document.getElementById('cal-month-label').textContent = MONTHS[month-1] + ' ' + year;
  const res = await fetch('/api/events/calendar/data?year=' + year + '&month=' + month, { headers: { 'x-user-id': localStorage.getItem('user_id') || '' } });
  const data = await res.json();
  renderCalendar(year, month, data.events || []);
  updateStats(data.events || []);
}

function renderCalendar(year, month, events) {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '<div class="weekday">Dom</div><div class="weekday">Lun</div><div class="weekday">Mar</div><div class="weekday">Mie</div><div class="weekday">Jue</div><div class="weekday">Vie</div><div class="weekday">Sab</div>';
  const firstDay = new Date(year, month-1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const daysInPrev = new Date(year, month-1, 0).getDate();
  const today = new Date();

  for (let i = firstDay - 1; i >= 0; i--) {
    grid.innerHTML += '<div class="cal-day other-month"><div class="day-num">' + (daysInPrev - i) + '</div></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dayEvents = events.filter(e => {
      const eDate = (e.date || '').split('T')[0];
      const eEnd = (e.end_date || e.date || '').split('T')[0];
      return eDate <= dateStr && eEnd >= dateStr;
    });
    const isToday = today.getFullYear() === year && today.getMonth() === month-1 && today.getDate() === d;
    grid.innerHTML += '<div class="cal-day ' + (isToday ? 'today' : '') + '" data-date="' + dateStr + '"><div class="day-num">' + d + '</div>' +
      dayEvents.map(e => '<div class="event-chip" onclick="location.href=\'/?event=' + e.id + '\'">' + e.name + ' <span class="count">(' + (e.checked_in_count || 0) + '/' + (e.guest_count || 0) + ')</span></div>').join('') + '</div>';
  }
  let remaining = 7 - ((firstDay + daysInMonth) % 7);
  if (remaining < 7) {
    for (let i = 1; i <= (remaining === 7 ? 0 : remaining); i++) {
      grid.innerHTML += '<div class="cal-day other-month"><div class="day-num">' + i + '</div></div>';
    }
  }
}

function updateStats(events) {
  const total = events.length;
  const totalGuests = events.reduce((s, e) => s + (e.guest_count || 0), 0);
  const totalChecked = events.reduce((s, e) => s + (e.checked_in_count || 0), 0);
  document.getElementById('cal-stats').innerHTML = '<span>📅 ' + total + ' eventos</span><span>👥 ' + totalGuests + ' invitados</span><span>✅ ' + totalChecked + ' check-ins</span>';
}

function prevMonth() {
  let m = currentMonth - 1, y = currentYear;
  if (m < 1) { m = 12; y--; }
  loadCalendar(y, m);
}

function nextMonth() {
  let m = currentMonth + 1, y = currentYear;
  if (m > 12) { m = 1; y++; }
  loadCalendar(y, m);
}

const now = new Date();
loadCalendar(now.getFullYear(), now.getMonth() + 1);
</script>
</body>
</html>
