<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación | Check Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f172a;z-index:9999}
#loading.hidden{display:none}
#loading .sp{width:40px;height:40px;border:3px solid rgba(255,255,255,0.06);border-top-color:#7c3aed;border-radius:50%;animation:s .7s linear infinite;margin:0 auto 12px}
@keyframes s{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:rgba(255,255,255,0.3)}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:40px 32px;max-width:480px;width:90%;margin:40px auto;text-align:center;backdrop-filter:blur(20px)}
.card .emoji{font-size:48px;margin-bottom:16px}
.card h1{font-size:28px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card .date{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:4px}
.card .location{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px}
.card .desc{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px;line-height:1.6}
.countdown{display:flex;justify-content:center;gap:16px;margin-bottom:28px}
.countdown-item{text-align:center}
.countdown-item .num{font-size:32px;font-weight:800;color:#a78bfa;display:block;line-height:1}
.countdown-item .lbl{font-size:10px;text-transform:uppercase;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-top:4px}
.qr-container{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;margin-bottom:24px;display:inline-block}
.qr-container img{width:160px;height:160px;display:block;margin:0 auto;border-radius:8px}
.qr-container p{font-size:11px;color:rgba(255,255,255,0.3);margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,0.3)}
.btn:active{transform:translateY(0)}
.btn-sec{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);margin-left:8px}
.btn-sec:hover{background:rgba(255,255,255,0.1);color:#fff;box-shadow:none}
.footer{font-size:11px;color:rgba(255,255,255,0.15);margin-top:32px}
.passed{text-align:center;padding:20px}
.passed .icon{font-size:48px;margin-bottom:12px}
.passed h2{font-size:20px;font-weight:700;color:#a78bfa;margin-bottom:8px}
.passed p{font-size:13px;color:rgba(255,255,255,0.4)}
@media(max-width:480px){.card{padding:28px 20px}.card h1{font-size:22px}.countdown-item .num{font-size:24px}}
</style>
</head>
<body>
<div id="loading"><div><div class="sp"></div><p>Cargando invitación...</p></div></div>
<div id="main" style="display:none;width:100%">
  <div class="card" id="event-card">
    <div class="emoji">🎉</div>
    <h1 id="event-name"></h1>
    <p class="date" id="event-date"></p>
    <p class="location" id="event-location"></p>
    <p class="desc" id="event-desc" style="display:none"></p>

    <div class="countdown" id="countdown">
      <div class="countdown-item"><span class="num" id="cd-days">00</span><span class="lbl">Días</span></div>
      <div class="countdown-item"><span class="num" id="cd-hours">00</span><span class="lbl">Horas</span></div>
      <div class="countdown-item"><span class="num" id="cd-mins">00</span><span class="lbl">Min</span></div>
      <div class="countdown-item"><span class="num" id="cd-secs">00</span><span class="lbl">Seg</span></div>
    </div>
    <div id="event-passed" class="passed" style="display:none">
      <div class="icon">✅</div>
      <h2>Evento finalizado</h2>
      <p>Gracias por tu interés</p>
    </div>

    <div class="qr-container">
      <img id="qr-img" alt="QR del evento">
      <p>Escanea para registrarte</p>
    </div>

    <div>
      <a class="btn" id="btn-register" href="#" target="_blank">📝 Confirmar asistencia</a>
      <button class="btn btn-sec" onclick="downloadQR()">⬇ Descargar QR</button>
    </div>

    <p class="footer">Generado por Check Pro</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
var API='/api',eventData=null,cdInterval=null;

function downloadQR(){
  var img=document.getElementById('qr-img');
  if(!img||!img.src)return;
  var a=document.createElement('a');
  a.href=img.src;a.download='qrevento.png';
  a.click()
}

function updateCountdown(){
  if(!eventData||!eventData.date)return;
  var target=new Date(eventData.date).getTime(),now=Date.now(),diff=target-now;
  if(diff<=0){
    document.getElementById('countdown').style.display='none';
    document.getElementById('event-passed').style.display='block';
    if(cdInterval)clearInterval(cdInterval);
    return
  }
  var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),
      m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-days').textContent=String(d).padStart(2,'0');
  document.getElementById('cd-hours').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent=String(s).padStart(2,'0')
}

async function load(){
  var p=window.location.pathname.split('/'),eventId=null,idx=p.indexOf('landing');
  if(idx>0)eventId=p[idx-1];
  if(!eventId||eventId==='event'){
    var params=new URLSearchParams(window.location.search);
    eventId=params.get('event')
  }
  if(!eventId){
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main').innerHTML='<div class="card"><h1 style="color:#ef4444">Invitación no válida</h1><p style="color:rgba(255,255,255,0.5)">El enlace no es válido o ha expirado.</p></div>';
    document.getElementById('main').style.display='block';return
  }
  try{
    var r=await fetch(API+'/event/'+eventId);
    if(!r.ok)throw Error('No encontrado');
    eventData=await r.json();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main').style.display='block';
    document.title=eventData.name+' | Invitación';
    document.getElementById('event-name').textContent=eventData.name||'Evento';
    if(eventData.date)document.getElementById('event-date').textContent=new Date(eventData.date).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
    if(eventData.location&&eventData.location!=='Por definir')document.getElementById('event-location').textContent='📍 '+eventData.location;
    if(eventData.description){document.getElementById('event-desc').textContent=eventData.description;document.getElementById('event-desc').style.display='block'}
    document.getElementById('btn-register').href='/registro.html?event='+eventId;
    // Generate QR for event registration link
    var regUrl=window.location.origin+'/registro.html?event='+eventId;
    try{
      var qrRes=await fetch(API+'/event/'+eventId+'/qr');
      if(qrRes.ok){var blob=await qrRes.blob();document.getElementById('qr-img').src=URL.createObjectURL(blob)}
    }catch(e){}
    updateCountdown();
    cdInterval=setInterval(updateCountdown,1000)
  }catch(e){
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main').innerHTML='<div class="card"><h1 style="color:#ef4444">Invitación no disponible</h1><p style="color:rgba(255,255,255,0.5)">No se pudo cargar la invitación.</p></div>';
    document.getElementById('main').style.display='block'
  }
}
load();
</script>
</body>
</html>
