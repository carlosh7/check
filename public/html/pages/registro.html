<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Check Pro</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        :root {
            --color-primary: #7c3aed;
            --color-primary-light: #a78bfa;
            --color-primary-dark: #5b21b6;
        }
    </style>
    <link rel="stylesheet" href="/css/modules/base.css?v=12.44.501">
    <link rel="stylesheet" href="/css/modules/components.css?v=12.44.496">
    <link rel="stylesheet" href="/css/modules/registro.css?v=12.44.496">
    <style>
        input[type="radio"] { accent-color: #7c3aed; }
        #policy-text h2 { color: #f8fafc; font-weight: 800; font-size: 14px; margin-bottom: 8px; margin-top: 12px; }
        #policy-text p { margin-bottom: 8px; }
        #policy-text ul, #policy-text ol { padding-left: 18px; margin-bottom: 8px; list-style: inherit; }
        #policy-text b, #policy-text strong { color: #a78bfa; font-weight: 700; }
        .registro-payment-summary { background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(168,85,247,0.05)); border: 1px solid rgba(124,58,237,0.2); border-radius: 12px; padding: 16px; text-align: center; }
        .registro-payment-amount { font-size: 24px; font-weight: 800; color: #a78bfa; display: block; }
        .registro-payment-desc { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    </style>
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            let theme = 'dark';
            if (saved === 'dark' || saved === 'light') {
                theme = saved;
            } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                theme = 'light';
            }
            document.documentElement.classList.remove('dark', 'light');
            document.documentElement.classList.add(theme);
        })();
    </script>
</head>
<body class="registro-body registro-bg-pattern" role="document" aria-label="Formulario de registro">
    <div id="loading" class="registro-loading">
        <div class="registro-loading-inner">
            <div class="registro-loading-icon">
                <span class="material-symbols-outlined">shield_checked</span>
            </div>
            <p class="registro-loading-text">Cargando...</p>
        </div>
    </div>

    <div id="main-content" class="registro-main hidden">
        <div class="registro-card glass-card">
            <div id="event-header" class="registro-header">
                <div id="event-logo" class="registro-logo hidden">
                    <img src="" alt="Logo">
                </div>
                <h2 id="page-title" class="registro-title">Registro de Invitados</h2>
                <h3 id="event-name" class="registro-event-name"></h3>
                <div id="event-location-container" class="registro-location">
                    <span class="material-symbols-outlined">location_on</span>
                    <span id="event-location"></span>
                </div>
                <p id="event-description" class="registro-description hidden"></p>
            </div>

            <div id="countdown-section" class="registro-countdown">
                <div id="countdown-timer" class="registro-countdown-timer">00:00:00</div>
                <p class="registro-countdown-label">Para el evento</p>
            </div>

            <div class="registro-form-body">
                <p id="welcome-text" class="registro-welcome-text hidden"></p>
                
                <form id="event-registration-form" class="registro-form">
                    <div class="registro-form-group">
                        <input type="text" id="reg-name" required placeholder="Nombre Completo *" class="input-field">
                    </div>
                    <div class="registro-form-group">
                        <input type="email" id="reg-email" required placeholder="Correo Electrónico *" class="input-field">
                    </div>
                    
                    <div id="field-phone" class="registro-form-group">
                        <input type="tel" id="reg-phone" placeholder="Teléfono" class="input-field">
                    </div>
                    
                    <div id="field-org" class="registro-form-grid-2">
                        <div class="registro-form-group">
                            <input type="text" id="reg-org" placeholder="Empresa" class="input-field">
                        </div>
                        <div id="field-position" class="registro-form-group">
                            <input type="text" id="reg-position" placeholder="Cargo/Puesto" class="input-field">
                        </div>
                    </div>
                    
                    <div id="field-vegan" class="registro-field-vegan">
                        <span class="registro-field-vegan-label">¿Eres vegano?</span>
                        <div class="registro-field-vegan-options">
                            <label class="registro-radio-label">
                                <input type="radio" name="vegan" value="no" checked>
                                <span>No</span>
                            </label>
                            <label class="registro-radio-label">
                                <input type="radio" name="vegan" value="si">
                                <span>Sí</span>
                            </label>
                        </div>
                    </div>
                    
                    <div id="field-gender" class="hidden registro-form-group">
                        <label class="form-label">Sexo</label>
                        <select id="reg-gender" class="input-field">
                            <option value="O">Prefiero no decir</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    
                    <div id="field-category" class="hidden registro-form-group">
                        <label class="form-label">Categor&iacute;a / Boleto</label>
                        <div id="cart-items" class="space-y-2"></div>
                        <div id="cart-total" class="hidden text-right text-sm font-bold text-[var(--primary)] mt-2"></div>
                        <div id="coupon-section" class="hidden flex gap-2 mt-3">
                            <input type="text" id="coupon-input" class="input-field flex-1 uppercase" placeholder="CÓDIGO DE DESCUENTO">
                            <button class="btn-secondary text-xs px-3" onclick="applyCoupon()">Aplicar</button>
                        </div>
                        <div id="coupon-result" class="hidden text-xs mt-1"></div>
                    </div>
                    
                    <div id="payment-summary" class="hidden registro-form-group">
                        <div class="registro-payment-summary">
                            <span id="payment-amount" class="registro-payment-amount"></span>
                            <span id="payment-description" class="registro-payment-desc"></span>
                        </div>
                    </div>
                    
                    <div id="field-dietary" class="registro-form-group">
                        <textarea id="reg-diet" placeholder="Alergias o restricciones alimentarias" class="input-field registro-textarea"></textarea>
                    </div>
                    
                    <div id="policy-section" class="registro-policy">
                        <div id="policy-text" class="registro-policy-text"></div>
                        <label id="agreement-label" class="registro-policy-label">
                            <input type="checkbox" id="reg-agreement" required class="registro-policy-checkbox">
                            <span class="registro-policy-text-small">Acepto la política de tratamiento de datos personales</span>
                        </label>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="registro-submit">
                        Confirmar Registro
                    </button>
                </form>
                
                <div id="success-message" class="registro-success hidden">
                    <p id="success-text" class="registro-success-text">¡Registro Exitoso!</p>
                    <p class="registro-success-message">Te esperamos en el evento.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="error-content" class="registro-error hidden">
        <div class="registro-error-inner">
            <div class="registro-error-icon">
                <span class="material-symbols-outlined">error</span>
            </div>
            <h2 class="registro-error-title">Evento no encontrado</h2>
            <p class="registro-error-text">El enlace de registro no es válido o ha expirado.</p>
            <a href="/" class="registro-back-btn">Volver al inicio</a>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let eventData = null;
        let categories = [];
        let cart = {};

        function updateCart(catId, delta) {
            cart[catId] = Math.max(0, (cart[catId] || 0) + delta);
            var el = document.getElementById('qty-' + catId);
            if (el) el.textContent = cart[catId] || 0;
            updateCartTotal();
        }
        var _appliedCoupon = null;
        function updateCartTotal() {
            var total = 0; var hasItems = false;
            categories.forEach(function(c) {
                var qty = cart[c.id] || 0;
                if (qty > 0) { total += c.price * qty; hasItems = true; }
            });
            document.getElementById('coupon-section').classList.toggle('hidden', !hasItems);
            var totalEl = document.getElementById('cart-total');
            var summaryEl = document.getElementById('payment-summary');
            var btn = document.getElementById('submit-btn');
            if (totalEl) { totalEl.classList.toggle('hidden', !hasItems); totalEl.textContent = 'Total: $' + total.toFixed(2) + ' ' + (eventData?.currency || 'USD'); }
            if (summaryEl) summaryEl.classList.toggle('hidden', !hasItems);
            if (btn) btn.textContent = hasItems ? 'Pagar con Stripe' : 'Confirmar Registro';
            _appliedCoupon = null; document.getElementById('coupon-result').classList.add('hidden');
        }
        async function applyCoupon() {
            var code = document.getElementById('coupon-input')?.value.trim();
            if (!code) return;
            var items = []; categories.forEach(function(c) { var q = cart[c.id] || 0; if (q > 0) items.push({ category_id: c.id, quantity: q }); });
            try {
                var r = await fetch(API_URL + '/events/' + eventData.id + '/coupons/validate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: code, items: items }) });
                var d = await r.json();
                var el = document.getElementById('coupon-result');
                if (d.valid) {
                    _appliedCoupon = code;
                    el.className = 'text-xs mt-1 text-green-400';
                    el.textContent = '✅ Cupón aplicado: -$' + d.discount.toFixed(2) + ' (Total: $' + d.finalTotal.toFixed(2) + ')';
                } else { el.className = 'text-xs mt-1 text-red-400'; el.textContent = '❌ ' + (d.error || 'Cupón inválido'); }
                el.classList.remove('hidden');
            } catch(e) {}
        }

        // Check if returning from payment
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('success') === '1') {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('event-registration-form').style.display = 'none';
                document.getElementById('success-message').classList.remove('hidden');
                document.getElementById('success-text').innerText = '¡Pago exitoso! Tu registro ha sido confirmado.';
                return;
            }
            if (params.get('cancel') === '1') {
                alert('El pago fue cancelado. Puedes intentar de nuevo.');
            }
        })();

        async function loadEvent() {
            const params = new URLSearchParams(window.location.search);
            const eventId = params.get('event');

            if (!eventId) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-content').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/event/${eventId}`);
                if (!res.ok) throw new Error('Evento no encontrado');

                eventData = await res.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');

                document.getElementById('page-title').innerText = eventData.reg_title || 'Registro de Invitados';
                document.getElementById('event-name').innerText = eventData.name || 'Evento';
                
                if (eventData.reg_logo_url && eventData.reg_logo_url.trim() !== "") {
                    const logoContainer = document.getElementById('event-logo');
                    logoContainer.classList.remove('hidden');
                    logoContainer.innerHTML = `<img src="${eventData.reg_logo_url}" alt="Logo">`;
                }

                if (eventData.location && eventData.location.trim() !== "" && eventData.location !== "Por definir") {
                    document.getElementById('event-location').innerText = eventData.location;
                } else {
                    document.getElementById('event-location-container').style.display = 'none';
                }

                if (eventData.description) {
                    document.getElementById('event-description').classList.remove('hidden');
                    document.getElementById('event-description').innerText = eventData.description;
                }

                if (eventData.reg_welcome_text) {
                    document.getElementById('welcome-text').classList.remove('hidden');
                    document.getElementById('welcome-text').innerText = eventData.reg_welcome_text;
                }

                if (eventData.reg_success_message) {
                    document.getElementById('success-text').innerText = eventData.reg_success_message;
                }

                // Load categories and check payment
                if (eventData.payment_required) {
                    try {
                        var catRes = await fetch(API_URL + '/guests/' + eventData.id + '/categories');
                        if (catRes.ok) {
                            categories = await catRes.json();
                            var catContainer = document.getElementById('field-category');
                            var cartDiv = document.getElementById('cart-items');
                            if (categories && categories.length > 0 && cartDiv) {
                                catContainer.classList.remove('hidden');
                                cartDiv.innerHTML = categories
                                    .filter(function(c) { return c.price > 0; })
                                    .map(function(c) {
                                        return '<div class="flex items-center justify-between p-2 rounded-lg bg-white/5">' +
                                            '<span class="text-sm">' + c.name + ' — <span class="text-[var(--primary)] font-bold">$' + parseFloat(c.price).toFixed(2) + '</span></span>' +
                                            '<div class="flex items-center gap-2"><button class="w-7 h-7 rounded-full bg-white/10 text-white font-bold text-sm" onclick="updateCart(\'' + c.id + '\',-1)">−</button>' +
                                            '<span id="qty-' + c.id + '" class="w-6 text-center text-sm font-bold">0</span>' +
                                            '<button class="w-7 h-7 rounded-full bg-white/10 text-white font-bold text-sm" onclick="updateCart(\'' + c.id + '\',1)">+</button></div></div>';
                                    }).join('');
                            }
                        }
                    } catch(e) { console.error('Error loading categories:', e); }
                }

                if (eventData.reg_policy) {
                    document.getElementById('policy-text').innerHTML = eventData.reg_policy;
                } else {
                    document.getElementById('policy-text').innerHTML = 'Al registrarse, acepta que sus datos sean utilizados únicamente para la gestión del evento.';
                }

                document.getElementById('reg-agreement').required = eventData.reg_require_agreement !== 0;

                document.getElementById('field-phone').style.display = eventData.reg_show_phone !== 0 ? 'block' : 'none';
                document.getElementById('field-org').style.display = eventData.reg_show_org !== 0 ? 'grid' : 'none';
                document.getElementById('field-position').style.display = eventData.reg_show_position === 1 ? 'block' : 'none';
                document.getElementById('field-vegan').style.display = eventData.reg_show_vegan !== 0 ? 'block' : 'none';
                document.getElementById('field-gender').style.display = eventData.reg_show_gender === 1 ? 'block' : 'none';
                document.getElementById('field-dietary').style.display = eventData.reg_show_dietary !== 0 ? 'block' : 'none';

                if (eventData.date) {
                    const eventDate = new Date(eventData.date);
                    const countdownSection = document.getElementById('countdown-section');
                    const now = new Date();
                    const initialDiff = eventDate - now;

                    if (initialDiff <= 0) {
                        countdownSection.style.display = 'none';
                    } else {
                        const countdownInterval = setInterval(() => {
                            const now = new Date();
                            const diff = eventDate - now;
                            if (diff > 0) {
                                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                                const s = Math.floor((diff % (1000 * 60)) / 1000);
                                document.getElementById('countdown-timer').innerText =
                                    `${d > 0 ? d + 'd ' : ''}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                            } else {
                                countdownSection.style.display = 'none';
                                clearInterval(countdownInterval);
                            }
                        }, 1000);
                    }
                } else {
                    document.getElementById('countdown-section').style.display = 'none';
                }

            } catch (e) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-content').classList.remove('hidden');
            }
        }

        document.getElementById('event-registration-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!eventData) return alert("Error: Evento no identificado");

            const btn = document.getElementById('submit-btn');
            const orig = btn.innerText;
            btn.innerText = "Procesando...";
            btn.disabled = true;

            const body = {
                event_id: eventData.id,
                name: document.getElementById('reg-name').value.trim(),
                email: document.getElementById('reg-email').value.trim().toLowerCase(),
                phone: document.getElementById('reg-phone').value.trim(),
                organization: document.getElementById('reg-org').value.trim(),
                position: document.getElementById('reg-position').value.trim(),
                gender: document.getElementById('reg-gender').value
            };

            const vegan = document.querySelector('input[name="vegan"]:checked')?.value || 'no';
            const dietary = document.getElementById('reg-diet').value;
            body.dietary_notes = vegan === 'si' ? 'Vegano' + (dietary ? ', ' + dietary : '') : dietary;

            // Payment flow (cart)
            var cartItems = [];
            categories.forEach(function(c) {
                var qty = cart[c.id] || 0;
                if (qty > 0) cartItems.push({ category_id: c.id, quantity: qty });
            });
            if (eventData.payment_required && cartItems.length > 0) {
                try {
                    var checkoutBody = { name: body.name, email: body.email, items: cartItems };
                    if (_appliedCoupon) checkoutBody.coupon_code = _appliedCoupon;
                    var checkoutRes = await fetch(API_URL + '/events/' + eventData.id + '/checkout-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(checkoutBody)
                    });
                        var checkoutData = await checkoutRes.json();
                        if (checkoutData.success && checkoutData.url) {
                            window.location.href = checkoutData.url;
                            return;
                        } else {
                            alert("Error al iniciar pago: " + (checkoutData.error || 'Error desconocido'));
                            btn.innerText = orig;
                            btn.disabled = false;
                            return;
                        }
                    } catch(e) {
                        alert("Error de conexión al procesar pago. Intenta de nuevo.");
                        btn.innerText = orig;
                        btn.disabled = false;
                        return;
                    }
                }
            }

            // Free registration
            try {
                const res = await fetch(`${API_URL}/public-register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const d = await res.json();
                if (d.success) {
                    e.target.style.display = 'none';
                    document.getElementById('success-message').classList.remove('hidden');
                    setTimeout(() => window.location.reload(), 4000);
                    document.body.onclick = () => window.location.reload();
                } else {
                    alert("Error: " + (d.error || 'No se pudo completar el registro'));
                }
            } catch (e) {
                alert("Error de conexión. Intenta de nuevo.");
            } finally {
                btn.innerText = orig;
                btn.disabled = false;
            }
        });

        loadEvent();
    </script>
</body>
</html>
