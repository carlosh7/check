<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Satisfacción - Check</title>
    <link rel="stylesheet" href="/css/modules/base.css?v=12.44.485">
    <link rel="stylesheet" href="/css/modules/components.css?v=12.44.485">
    <link rel="stylesheet" href="/css/modules/forms.css?v=12.44.485">
    <link rel="stylesheet" href="/css/modules/survey.css?v=12.44.485">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            let theme = savedTheme || (prefersDark ? 'dark' : 'light');
            
            if (theme !== 'dark' && theme !== 'light') {
                theme = 'dark';
            }
            
            document.documentElement.classList.remove('dark', 'light');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
            localStorage.setItem('theme', theme);
        })();
    </script>
</head>
<body class="survey-body">
    <div class="card survey-card">
        <h1 class="survey-title">Tu Opinión Importa</h1>
        <form id="survey-form">
            <div class="form-group">
                <label>¿Cómo calificarías tu experiencia? (1-5 ⭐)</label>
                <div class="survey-rating-row">
                    <label class="survey-label-click"><input type="radio" name="rating" value="1" required> 1</label>
                    <label class="survey-label-click"><input type="radio" name="rating" value="2"> 2</label>
                    <label class="survey-label-click"><input type="radio" name="rating" value="3"> 3</label>
                    <label class="survey-label-click"><input type="radio" name="rating" value="4"> 4</label>
                    <label class="survey-label-click"><input type="radio" name="rating" value="5"> 5</label>
                </div>
            </div>
            <div class="form-group">
                <label>Algún comentario adicional:</label>
                <textarea id="survey-comment" class="survey-textarea" placeholder="Cuéntanos más..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary survey-btn-full">Enviar Feedback</button>
        </form>
        <div id="survey-thanks" class="hidden survey-thanks">
            <div class="survey-emoji-large">🎉</div>
            <h2>¡Muchas gracias!</h2>
            <p>Tu respuesta nos ayuda a mejorar para próximos eventos.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        const surveyForm = document.getElementById('survey-form');

        async function loadSurvey() {
            const res = await fetch(`/api/events/${eventId}/surveys`);
            const questions = await res.json();
            
            if (questions.length > 0) {
                const questionsHtml = questions.map((q) => {
                    let inputHtml = "";
                    
                    if (q.type === 'yes_no') {
                        inputHtml = `
                            <div style="display: flex; gap: 2rem; justify-content: center; margin: 1rem 0;">
                                <label style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem;">
                                    <input type="radio" name="q-${q.id}" value="5" required style="width: 20px; height: 20px;"> ✅ Sí
                                </label>
                                <label style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem;">
                                    <input type="radio" name="q-${q.id}" value="1" required style="width: 20px; height: 20px;"> ❌ No
                                </label>
                            </div>
                        `;
                    } else {
                        // Estrellas (opción por defecto)
                        inputHtml = `
                            <div style="display: flex; gap: 1rem; justify-content: center; margin: 1rem 0;">
                                ${[1,2,3,4,5].map(v => `
                                    <label style="cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
                                        <input type="radio" name="q-${q.id}" value="${v}" required>
                                        <span style="font-size: 0.8rem;">${v}★</span>
                                    </label>
                                `).join('')}
                            </div>
                        `;
                    }

                    return `
                        <div class="form-group" style="margin-top: 2rem; border-top: 1px solid var(--outline); padding-top: 1.5rem;">
                            <label style="font-size: 1.1rem; font-weight: 600; text-align: center; display: block;">${q.question}</label>
                            ${inputHtml}
                        </div>
                    `;
                }).join('');
                
                surveyForm.insertAdjacentHTML('afterbegin', questionsHtml);
            } else {
                // Fallback
                surveyForm.insertAdjacentHTML('afterbegin', `
                    <div class="form-group" style="text-align: center;">
                        <label style="font-size: 1.1rem; font-weight: 600;">¿Cómo calificarías tu experiencia general?</label>
                        <div style="display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0;">
                            ${[1,2,3,4,5].map(v => `
                                <label style="cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;">
                                    <input type="radio" name="rating" value="${v}" required>
                                    <span style="font-size: 0.8rem;">${v}★</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `);
            }
        }

        surveyForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(surveyForm);
            const comment = document.getElementById('survey-comment').value;

            // Enviamos un promedio de todas las respuestas como "rating" para simplicidad en el dashboard
            let totalRating = 0;
            let count = 0;
            for (let value of formData.values()) {
                if (!isNaN(value)) {
                    totalRating += parseInt(value);
                    count++;
                }
            }
            const finalRating = count > 0 ? Math.round(totalRating / count) : 5;

            const res = await fetch(`/api/events/${eventId}/surveys/responses`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    guest_id: null,
                    responses: { rating: finalRating, comment: comment }
                })
            });

            if (res.ok) {
                surveyForm.classList.add('hidden');
                document.getElementById('survey-thanks').classList.remove('hidden');
            }
        };

        loadSurvey();
    </script>
</body>
</html>
