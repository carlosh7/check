<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Ruleta | Check Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="/css/modules/base.css?v=12.44.501">
    <link rel="stylesheet" href="/css/modules/wheel.css?v=12.44.496">
    <style>
        :root { --primary: #7c3aed; }
        .wheel-pro { position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%); overflow:hidden; }
        .wheel-pro::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 70%); pointer-events:none; }
        .wheel-pro-card { position:relative; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:24px; padding:32px; max-width:520px; width:100%; margin:20px; backdrop-filter:blur(20px); }
        .wheel-pro-title { font-size:24px; font-weight:800; text-align:center; color:#fff; margin-bottom:4px; }
        .wheel-pro-event { font-size:13px; color:rgba(255,255,255,0.4); text-align:center; margin-bottom:24px; font-weight:500; }
        .wheel-pro-canvas-wrap { position:relative; width:340px; height:340px; margin:0 auto 24px; }
        .wheel-pro-canvas { width:340px; height:340px; display:block; }
        .wheel-pro-pointer { position:absolute; top:-18px; left:50%; transform:translateX(-50%); z-index:10; width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent; border-top:28px solid var(--pointer-color,#ef4444); filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .wheel-pro-spin { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px; border:none; border-radius:14px; font-size:16px; font-weight:700; color:#fff; cursor:pointer; background:linear-gradient(135deg,#7c3aed,#a78bfa); transition:all 0.3s; position:relative; overflow:hidden; }
        .wheel-pro-spin:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 25px rgba(124,58,237,0.4); }
        .wheel-pro-spin:disabled { opacity:0.5; cursor:not-allowed; }
        .wheel-pro-spin::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.1) 50%,transparent 70%); animation:shimmer 2s infinite; transform:translateX(-100%); }
        @keyframes shimmer { to { transform:translateX(100%); } }
        .wheel-pro-winner { text-align:center; padding:20px; margin-top:20px; background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(251,191,36,0.05)); border:1px solid rgba(251,191,36,0.2); border-radius:16px; display:none; }
        .wheel-pro-winner.show { display:block; animation:fadeInUp 0.5s; }
        .wheel-pro-winner-icon { font-size:48px; margin-bottom:8px; }
        .wheel-pro-winner-name { font-size:22px; font-weight:800; color:#fbbf24; }
        .wheel-pro-winner-sub { font-size:13px; color:rgba(255,255,255,0.5); margin-top:4px; }
        .wheel-pro-share { display:flex; gap:8px; margin-top:16px; }
        .wheel-pro-share input { flex:1; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff; font-size:12px; outline:none; }
        .wheel-pro-share input:focus { border-color:var(--primary); }
        .wheel-pro-share button { padding:10px 16px; border:none; border-radius:10px; background:var(--primary); color:#fff; cursor:pointer; font-size:12px; font-weight:600; white-space:nowrap; }
        .wheel-pro-share button:hover { background:#6d28d9; }
        .wheel-pro-stats { display:flex; gap:16px; justify-content:center; margin-top:16px; }
        .wheel-pro-stat { text-align:center; }
        .wheel-pro-stat-num { font-size:20px; font-weight:800; color:#fff; }
        .wheel-pro-stat-label { font-size:11px; color:rgba(255,255,255,0.4); }
        .wheel-pro-winners { margin-top:20px; display:none; }
        .wheel-pro-winners.show { display:block; }
        .wheel-pro-winners-title { font-size:14px; font-weight:700; color:#fff; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .wheel-pro-winner-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; background:rgba(255,255,255,0.03); margin-bottom:4px; font-size:13px; }
        .wheel-pro-winner-medal { font-size:18px; }
        .wheel-pro-winner-name-item { color:#fff; font-weight:500; flex:1; }
        .wheel-pro-winner-time { color:rgba(255,255,255,0.3); font-size:11px; }
        .wheel-pro-toolbar { display:flex; gap:8px; justify-content:flex-end; margin-bottom:16px; }
        .wheel-pro-toolbar button { width:36px; height:36px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.6); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; font-size:18px; }
        .wheel-pro-toolbar button:hover { background:rgba(255,255,255,0.1); color:#fff; }
        .wheel-pro-toolbar button.active { background:var(--primary); color:#fff; border-color:var(--primary); }
        .wheel-pro-loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#0f172a; z-index:9999; }
        .wheel-pro-loading.hidden { display:none; }
        .wheel-pro-loading-inner { text-align:center; }
        .wheel-pro-loading-spinner { width:48px; height:48px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .wheel-pro-loading-text { color:rgba(255,255,255,0.5); font-size:14px; }
        .wheel-pro-error { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:#0f172a; z-index:9999; }
        .wheel-pro-error.show { display:flex; }
        .wheel-pro-error-inner { text-align:center; }
        .wheel-pro-error-icon { font-size:64px; margin-bottom:16px; }
        .wheel-pro-error-title { font-size:20px; font-weight:700; color:#fff; margin-bottom:8px; }
        .wheel-pro-error-text { color:rgba(255,255,255,0.5); font-size:14px; margin-bottom:24px; }
        .wheel-pro-error-btn { padding:10px 24px; border:none; border-radius:10px; background:var(--primary); color:#fff; cursor:pointer; font-weight:600; }
        .wheel-pro-save-feedback { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:12px; font-size:14px; font-weight:600; z-index:9999; display:none; animation:fadeInUp 0.3s; }
        .wheel-pro-save-feedback.success { background:#065f46; color:#6ee7b7; border:1px solid rgba(110,231,183,0.2); }
        .wheel-pro-save-feedback.error { background:#7f1d1d; color:#fca5a5; border:1px solid rgba(252,165,165,0.2); }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px) translateX(-50%); } to { opacity:1; transform:translateY(0) translateX(-50%); } }
        .wheel-pro-confetti { position:fixed; pointer-events:none; z-index:9998; }
        .wheel-pro-projector { position:fixed; inset:0; background:#000; display:none; z-index:9997; }
        .wheel-pro-projector.show { display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .wheel-pro-projector-canvas { width:min(80vw,80vh); height:min(80vw,80vh); }
        .wheel-pro-projector-pointer { position:absolute; top:calc(50% - 50vh); left:50%; transform:translateX(-50%); z-index:10; width:0; height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:36px solid var(--pointer-color,#ef4444); filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .wheel-pro-projector-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
        .wheel-pro-projector-btn-close { position:absolute; top:20px; right:20px; z-index:9998; width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.5); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:24px; }
        .wheel-pro-projector-btn-close:hover { background:rgba(255,255,255,0.1); }
        .wheel-pro-projector-spin { margin-top:24px; padding:16px 40px; border:none; border-radius:14px; background:linear-gradient(135deg,#7c3aed,#a78bfa); color:#fff; font-size:18px; font-weight:700; cursor:pointer; }
        .wheel-pro-projector-spin:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(124,58,237,0.4); }
        .wheel-pro-projector-spin:disabled { opacity:0.5; cursor:not-allowed; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading" class="wheel-pro-loading">
        <div class="wheel-pro-loading-inner">
            <div class="wheel-pro-loading-spinner"></div>
            <p class="wheel-pro-loading-text">Cargando ruleta...</p>
        </div>
    </div>

    <!-- Error -->
    <div id="error-content" class="wheel-pro-error">
        <div class="wheel-pro-error-inner">
            <div class="wheel-pro-error-icon">🎰</div>
            <h2 class="wheel-pro-error-title">Ruleta no disponible</h2>
            <p id="error-message" class="wheel-pro-error-text">Esta ruleta no existe o ha sido desactivada.</p>
            <button class="wheel-pro-error-btn" onclick="window.location.href='/'">Volver al inicio</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="wheel-pro" style="display:none">
        <div class="wheel-pro-card">
            <div class="wheel-pro-toolbar">
                <button id="btn-sound" onclick="toggleSound()" title="Sonido">🔊</button>
                <button id="btn-fullscreen" onclick="toggleProjector()" title="Pantalla completa">⛶</button>
                <button onclick="shareWheel()" title="Compartir">🔗</button>
            </div>
            <h1 id="wheel-name" class="wheel-pro-title">Ruleta</h1>
            <p id="event-name" class="wheel-pro-event"></p>

            <div class="wheel-pro-canvas-wrap">
                <div class="wheel-pro-pointer" id="wheel-pointer"></div>
                <canvas id="wheel-canvas" class="wheel-pro-canvas" width="340" height="340"></canvas>
            </div>

            <button id="btn-spin" class="wheel-pro-spin" onclick="spinWheel()">
                <span>🎡</span> GIRAR RULETA
            </button>

            <div id="winner-section" class="wheel-pro-winner">
                <div class="wheel-pro-winner-icon">🏆</div>
                <div class="wheel-pro-winner-name" id="winner-name"></div>
                <div class="wheel-pro-winner-sub">¡Felicidades! Has sido seleccionado</div>
            </div>

            <div id="winners-section" class="wheel-pro-winners">
                <div class="wheel-pro-winners-title">🏆 Ganadores</div>
                <div id="winners-list"></div>
            </div>

            <div class="wheel-pro-stats">
                <div class="wheel-pro-stat"><div class="wheel-pro-stat-num" id="stat-spins">0</div><div class="wheel-pro-stat-label">Giros</div></div>
                <div class="wheel-pro-stat"><div class="wheel-pro-stat-num" id="stat-winners">0</div><div class="wheel-pro-stat-label">Ganadores</div></div>
                <div class="wheel-pro-stat"><div class="wheel-pro-stat-num" id="stat-participants">0</div><div class="wheel-pro-stat-label">Participantes</div></div>
            </div>

            <div class="wheel-pro-share">
                <input type="text" id="share-url" readonly placeholder="Cargando...">
                <button onclick="copyUrl()">Copiar link</button>
            </div>
        </div>
    </div>

    <!-- Projector Mode -->
    <div id="projector-mode" class="wheel-pro-projector">
        <button class="wheel-pro-projector-btn-close" onclick="exitProjector()">✕</button>
        <div class="wheel-pro-projector-wrap">
            <div style="position:relative;display:flex;align-items:center;justify-content:center">
                <div class="wheel-pro-projector-pointer" id="pointer-projector" style="position:absolute;top:-10px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;border-top:36px solid var(--pointer-color,#ef4444);filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5))"></div>
                <canvas id="canvas-projector" class="wheel-pro-projector-canvas" width="800" height="800"></canvas>
            </div>
            <button id="btn-spin-projector" class="wheel-pro-projector-spin" onclick="spinWheel()">🎡 GIRAR RULETA</button>
            <div id="winner-section-projector" class="wheel-pro-winner" style="margin-top:16px;max-width:500px"></div>
        </div>
    </div>

    <!-- Save Feedback -->
    <div id="save-feedback" class="wheel-pro-save-feedback"></div>

    <script>
        const API_URL = '/api';
        let wheelData = null, participants = [], originalParticipants = [], winners = [];
        let isSpinning = false, currentRotation = 0, soundEnabled = true;

        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const canvasP = document.getElementById('canvas-projector');
        const ctxP = canvasP.getContext('2d');

        function getColors() {
            var c = (wheelData && wheelData.config) || {};
            return {
                wheelColors: c.wheel_colors || ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F'],
                textColor: c.wheel_text_color || '#FFFFFF',
                pointerColor: c.pointer_color || '#ef4444',
                soundEnabled: c.sound_enabled !== false,
                confettiEnabled: c.confetti_on_win !== false
            };
        }

        function drawWheelOnCtx(targetCtx, targetCanvas, rotation) {
            var colors = getColors();
            var w = targetCanvas.width, h = targetCanvas.height;
            targetCtx.clearRect(0,0,w,h);
            targetCtx.save();
            targetCtx.translate(w/2, h/2);
            targetCtx.rotate(rotation);

            var num = participants.length;
            if (num === 0) { targetCtx.restore(); return; }
            var arc = (2 * Math.PI) / num;

            participants.forEach(function(name, i) {
                var sa = i * arc, ea = (i+1) * arc;
                targetCtx.beginPath();
                targetCtx.moveTo(0,0);
                targetCtx.arc(0,0,w/2-4,sa,ea);
                targetCtx.closePath();
                targetCtx.fillStyle = colors.wheelColors[i % colors.wheelColors.length];
                targetCtx.fill();
                targetCtx.strokeStyle = 'rgba(255,255,255,0.15)';
                targetCtx.lineWidth = 2;
                targetCtx.stroke();

                targetCtx.save();
                targetCtx.rotate(sa + arc/2);
                targetCtx.textAlign = 'right';
                targetCtx.fillStyle = colors.textColor;
                var fs = w >= 700 ? 28 : 13;
                targetCtx.font = 'bold ' + fs + 'px Plus Jakarta Sans';
                targetCtx.shadowColor = 'rgba(0,0,0,0.6)';
                targetCtx.shadowBlur = 3;
                var display = name.length > 14 ? name.substring(0,12) + '..' : name;
                targetCtx.fillText(display, w/2 - (w >= 700 ? 60 : 12), 5);
                targetCtx.restore();
            });

            var cs = w >= 700 ? 50 : 28;
            targetCtx.beginPath();
            targetCtx.arc(0,0,cs,0,2*Math.PI);
            targetCtx.fillStyle = '#1e293b';
            targetCtx.fill();
            targetCtx.strokeStyle = 'rgba(255,255,255,0.2)';
            targetCtx.lineWidth = 3;
            targetCtx.stroke();
            targetCtx.beginPath();
            targetCtx.arc(0,0,cs/2,0,2*Math.PI);
            targetCtx.fillStyle = '#7c3aed';
            targetCtx.fill();
            targetCtx.restore();
        }

        function drawWheel(rotation) {
            drawWheelOnCtx(ctx, canvas, rotation);
            drawWheelOnCtx(ctxP, canvasP, rotation);
            var colors = getColors();
            document.getElementById('wheel-pointer').style.setProperty('--pointer-color', colors.pointerColor);
            var pp = document.getElementById('pointer-projector');
            if (pp) pp.style.setProperty('--pointer-color', colors.pointerColor);
        }

        function spinWheel() {
            if (isSpinning || participants.length === 0) return;
            isSpinning = true;
            document.getElementById('btn-spin').disabled = true;
            document.getElementById('btn-spin-projector').disabled = true;
            document.getElementById('winner-section').classList.remove('show');
            document.getElementById('winner-section').style.display = 'none';

            var duration = 4000 + Math.random() * 2000;
            var extra = 5 + Math.random() * 3;
            var target = currentRotation + (extra * 2 * Math.PI);
            var startTime = Date.now();
            var startRot = currentRotation;

            if (soundEnabled) playTick();

            function animate() {
                var elapsed = Date.now() - startTime;
                var progress = Math.min(elapsed / duration, 1);
                var ease = 1 - Math.pow(1 - progress, 4);
                currentRotation = startRot + (target - startRot) * ease;
                drawWheel(currentRotation);
                if (progress < 1) { requestAnimationFrame(animate); }
                else {
                    isSpinning = false;
                    document.getElementById('btn-spin').disabled = false;
                    document.getElementById('btn-spin-projector').disabled = false;
                    var arc = (2 * Math.PI) / participants.length;
                    var angle = (-currentRotation) % (2 * Math.PI);
                    if (angle < 0) angle += 2 * Math.PI;
                    var idx = Math.floor(angle / arc) % participants.length;
                    var winner = participants[idx];
                    showWinner(winner);
                    recordSpin(winner);
                }
            }
            animate();
        }

        var tickAudioCtx = null;
        function playTick() {
            try {
                if (!tickAudioCtx) tickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                var osc = tickAudioCtx.createOscillator();
                var gain = tickAudioCtx.createGain();
                osc.connect(gain);
                gain.connect(tickAudioCtx.destination);
                osc.frequency.value = 800 + Math.random() * 400;
                gain.gain.value = 0.1;
                osc.start();
                osc.stop(tickAudioCtx.currentTime + 0.05);
            } catch(e) {}
        }

        function showWinner(winner) {
            winners.push(winner);
            participants = participants.filter(function(p) { return p !== winner; });
            drawWheel(currentRotation);

            var ws = document.getElementById('winner-section');
            document.getElementById('winner-name').textContent = winner;
            ws.style.display = 'block';
            ws.classList.add('show');

            var wsP = document.getElementById('winner-section-projector');
            if (wsP) { wsP.innerHTML = '<div class="wheel-pro-winner-icon">🏆</div><div class="wheel-pro-winner-name">' + winner + '</div><div class="wheel-pro-winner-sub">¡Felicidades!</div>'; }

            var colors = getColors();
            if (colors.confettiEnabled) createConfetti();
            updateStats();
        }

        function updateStats() {
            document.getElementById('stat-spins').textContent = winners.length;
            document.getElementById('stat-winners').textContent = winners.length;
            document.getElementById('stat-participants').textContent = participants.length;

            var ws = document.getElementById('winners-section');
            var wl = document.getElementById('winners-list');
            if (winners.length > 0) {
                ws.classList.add('show');
                wl.innerHTML = winners.map(function(w, i) {
                    var medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '🎁';
                    return '<div class="wheel-pro-winner-item"><span class="wheel-pro-winner-medal">' + medal + '</span><span class="wheel-pro-winner-name-item">' + w + '</span></div>';
                }).join('');
            }
        }

        function createConfetti() {
            var colors = ['#FF6B6B','#4ECDC4','#7c3aed','#fbbf24','#34d399','#f472b6','#60a5fa'];
            for (var i = 0; i < 80; i++) {
                var el = document.createElement('div');
                el.className = 'wheel-pro-confetti';
                el.style.cssText = 'left:' + Math.random()*100 + 'vw;top:-10px;width:' + (Math.random()*8+4) + 'px;height:' + (Math.random()*8+4) + 'px;background:' + colors[Math.floor(Math.random()*colors.length)] + ';border-radius:' + (Math.random()>0.5?'50%':'2px') + ';animation:fall' + i + ' ' + (Math.random()*2+1.5) + 's linear forwards;';
                document.body.appendChild(el);
                var style = document.createElement('style');
                style.textContent = '@keyframes fall' + i + '{to{transform:translateY(100vh) rotate(' + (Math.random()*720) + 'deg);opacity:0;}}';
                document.head.appendChild(style);
                setTimeout(function() { el.remove(); style.remove(); }, 4000);
            }
        }

        async function recordSpin(winner) {
            if (!wheelData || !wheelData.id) return;
            try {
                await fetch(API_URL + '/raffles/' + wheelData.id + '/spin', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ winnerName:winner }) });
            } catch(e) {}
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('btn-sound').textContent = soundEnabled ? '🔊' : '🔇';
        }

        function toggleProjector() {
            var p = document.getElementById('projector-mode');
            var show = p.classList.contains('show');
            if (show) { p.classList.remove('show'); p.style.display = 'none'; } 
            else { p.classList.add('show'); p.style.display = 'flex'; try { document.body.requestFullscreen(); } catch(e) {} }
        }

        function exitProjector() {
            var p = document.getElementById('projector-mode');
            p.classList.remove('show'); p.style.display = 'none';
            try { document.exitFullscreen(); } catch(e) {}
        }

        function shareWheel() {
            var url = document.getElementById('share-url');
            if (url && url.value && navigator.share) {
                navigator.share({ title: 'Ruleta | Check Pro', url: url.value }).catch(function() {});
            } else if (url && url.value) { copyUrl(); }
        }

        function copyUrl() {
            var url = document.getElementById('share-url');
            if (!url || !url.value) return;
            navigator.clipboard.writeText(url.value).then(function() {
                showFeedback('✅ Link copiado', true);
            }).catch(function() { url.select(); document.execCommand('copy'); });
        }

        var feedbackTimeout;
        function showFeedback(msg, ok) {
            var el = document.getElementById('save-feedback');
            el.textContent = msg;
            el.className = 'wheel-pro-save-feedback ' + (ok ? 'success' : 'error');
            el.style.display = 'block';
            clearTimeout(feedbackTimeout);
            feedbackTimeout = setTimeout(function() { el.style.display = 'none'; }, 2500);
        }

        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement) {
                var p = document.getElementById('projector-mode');
                p.classList.remove('show');
                p.style.display = 'none';
            }
        });

        async function loadWheel() {
            var parts = window.location.pathname.split('/');
            var raffleId = null;
            if (parts.includes('raffle')) {
                var idx = parts.indexOf('raffle');
                raffleId = parts[idx + 1];
            }

            if (!raffleId || raffleId === 'undefined') {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-content').classList.add('show');
                document.getElementById('error-message').textContent = 'Ruleta no válida';
                return;
            }

            try {
                var res = await fetch(API_URL + '/raffles/' + raffleId + '/public');
                if (!res.ok) throw new Error('Ruleta no encontrada');
                wheelData = await res.json();
                participants = wheelData.participants || [];
                originalParticipants = participants.slice();
                winners = [];

                if (participants.length === 0) {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error-content').classList.add('show');
                    document.getElementById('error-message').textContent = 'Esta ruleta no tiene participantes';
                    return;
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').style.display = 'flex';

                document.getElementById('wheel-name').textContent = wheelData.name || 'Ruleta';
                document.getElementById('event-name').textContent = wheelData.event_name || '';
                document.title = (wheelData.name || 'Ruleta') + ' | Check Pro';
                document.getElementById('share-url').value = window.location.href;
                document.getElementById('stat-participants').textContent = participants.length;

                var colors = getColors();
                soundEnabled = colors.soundEnabled;
                document.getElementById('btn-sound').textContent = soundEnabled ? '🔊' : '🔇';

                drawWheel(0);
            } catch(e) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-content').classList.add('show');
            }
        }

        loadWheel();
    </script>
</body>
</html>
