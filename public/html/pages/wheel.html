<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta | Check Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased}

#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f172a;z-index:99999}
#loading.hidden{display:none}
#loading .sp{width:40px;height:40px;border:3px solid rgba(255,255,255,0.08);border-top-color:#7c3aed;border-radius:50%;animation:s .7s linear infinite;margin:0 auto 12px}
@keyframes s{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:rgba(255,255,255,0.4);text-align:center}

#error{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:#0f172a;z-index:99999;text-align:center;padding:32px}
#error.show{display:flex}
#error h2{font-size:20px;font-weight:700;margin-bottom:8px}
#error p{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:24px}
#error button{padding:10px 28px;border:none;border-radius:10px;background:#7c3aed;color:#fff;font-size:14px;font-weight:600;cursor:pointer}

.wof__main{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;background-size:cover;background-position:center;position:relative}
.wof__main.playing{background-size:cover;background-repeat:no-repeat}
.wof__main.centered{justify-content:center}
.wof__main.fullscreen{position:fixed;inset:0;z-index:99998;border-radius:0}
.wof__main.spinning .wof__main__options{display:none}
.wof__main.spinning .wof__wheel__winner{margin-top:-15px}

.wof__main__l{display:flex;flex-direction:column;align-items:center;position:relative}

.wof__wheel{position:relative;width:350px;height:350px;padding:8px;-webkit-transform:rotate(-55deg);transform:rotate(-55deg)}
.wof__wheel canvas{width:100%;height:100%;max-width:100%;max-height:100%}

.wof__wheel__pointer{position:absolute;top:50%;right:-30px;margin-top:-21px;z-index:1000;width:54px;height:40px;transition:all .2s ease}
.wof__wheel__pointer svg{width:100%;height:100%}

.wof__wheel__border{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;border:8px solid #111;box-shadow:rgba(50,50,93,0.05)0 30px 60px -12px inset,rgba(0,0,0,0.16)5px 5px 0 0 inset;cursor:pointer}

.wof__wheel__logo{width:90px;height:90px;object-fit:cover;object-position:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(55deg);border-radius:50%;border:6px solid rgba(255,255,255,.4);z-index:5}

.wof__wheel__winner{font-size:36px;width:100%;z-index:99999;text-align:center;line-height:1;margin-bottom:8px;color:#1a1a1a}
.wof__wheel__winner h2{font-size:inherit;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90vw}

.wof__main__btn{border-radius:8px;border:0;width:100%;height:48px;font-weight:700;font-size:16px;margin-top:24px;cursor:pointer;max-width:300px;transition:opacity .2s;color:#fff}
.wof__main__btn:hover{opacity:.85}

.wof__main__r{display:flex;flex-direction:column;justify-content:center;padding:20px;text-align:center;max-width:400px}
.wof__main__title{font-size:28px;font-weight:900;margin-bottom:12px;word-break:break-word;color:#1a1a1a}
.wof__main__desc{font-size:14px;margin-bottom:20px;word-break:break-word;white-space:pre-wrap;color:#1a1a1a;opacity:.7}
.wof__main__form .fld{width:100%;padding:12px 14px;margin-bottom:8px;border-radius:8px;border:1px solid rgba(0,0,0,0.1);background:rgba(255,255,255,.9);font-size:14px;outline:none;color:#1a1a1a}
.wof__main__form .fld:focus{border-color:#7c3aed}

.wof__main__options{position:absolute;bottom:30px;display:flex;gap:8px;z-index:100}
.wof__main__options-item{opacity:.5;cursor:pointer;transition:all .2s;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,0.06);font-size:18px;color:#475569}
.wof__main__options-item:hover{opacity:1;transform:scale(1.1)}
.wof__main__options-item.hide-fs{display:flex}
.wof__main.fullscreen .wof__main__options-item.hide-fs{display:none}

.wof__main__winners{position:absolute;bottom:80px;left:0;width:100%;text-align:center;font-size:13px;padding:8px;border-radius:8px 8px 0 0;background:rgba(255,255,255,.05);color:#475569;display:none}
.wof__main__winners.show{display:block}

.wof__main__watermark{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:99;font-size:11px;color:rgba(255,255,255,0.3);pointer-events:none;white-space:nowrap}

.color_palette-inapp{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:6px 10px;background:rgba(255,255,255,.15);border-radius:8px;backdrop-filter:blur(8px)}
.color_palette-inapp.hidden{display:none}
.cp{width:24px;height:24px;border-radius:50%;cursor:pointer;display:flex;overflow:hidden;border:1px solid rgba(255,255,255,0.2);flex-shrink:0;transition:all .2s}
.cp:hover{transform:scale(1.2);border-color:#7c3aed}
.cp span{flex:1}

#jsccc{position:fixed;width:100%;height:100%;top:0;left:0;z-index:999999;pointer-events:none}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999999;display:none;animation:pop .3s cubic-bezier(.17,.67,.12,.99)}
.toast.ok{background:#065f46;color:#6ee7b7}
.toast.err{background:#7f1d1d;color:#fca5a5}
@keyframes pop{0%{transform:scale(.9)translateX(-50%);opacity:0}to{transform:scale(1)translateX(-50%);opacity:1}}

@media(min-width:1025px){
.wof__main{flex-direction:row}
.wof__main__l{margin-right:40px}
.wof__main__r{text-align:left}
.wof__wheel{width:500px;height:500px;-webkit-transform:rotate(0);transform:rotate(0)}
.wof__wheel__logo{width:120px;height:120px;transform:translate(-50%,-50%) rotate(0)}
.wof__wheel__pointer{width:74px;height:45px;right:-40px}
.wof__main__watermark{bottom:20px;right:30px;left:auto;transform:none;font-size:13px}
.wof__main__options{bottom:30px;right:30px;left:auto}
.wof__main__btn{max-width:300px}
}
</style>
</head>
<body>
<div id="loading"><div><div class="sp"></div><p>Cargando ruleta...</p></div></div>
<div id="error"><div><h2>Ruleta no disponible</h2><p id="errmsg"></p><button onclick="window.location.href='/'">Volver</button></div></div>

<div id="screencast" class="wof__main centered">
  <div class="wof__main__l">
    <div class="wof__wheel__winner" id="winner-display" style="display:none">
      <h2 id="winner-name"></h2>
    </div>
    <div class="wof__wheel">
      <img id="wheel-logo" class="wof__wheel__logo" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%231e293b'/><text x='50' y='62' text-anchor='middle' font-size='36' fill='%23fff'>🎡</text></svg>" alt="">
      <canvas id="canvas" width="500" height="500"></canvas>
      <div class="wof__wheel__pointer">
        <svg viewBox="0 0 273 147" class="wof__wheel__pointer-svg">
          <g>
            <path fill="#ff7878" d="M196.3 0h10.5l1 .25c10.06 1.9 19.63 5.06 28.1 10.93 11.28 7.55 19.66 18.43 25.12 30.78 1.9 6.4 4.06 12.23 4 19.04-.1 5.3.3 10.7-.34 15.97-2.18 14.1-9.08 27.46-19.38 37.33-10.03 10-23.32 16.4-37.33 18.4-4.95.54-10 .3-14.97.3-6.4-.02-13.06-2.82-19.2-4.68-54.98-17.5-109.95-35.08-164.96-52.5C4.7 74.7 2.14 73.33 0 69.5v-6.26c1.47-1.93 2.94-3.95 5.34-4.77C64.47 39.78 123.84 20.77 183 2c4.3-1.15 8.9-1.2 13.3-2z"></path>
            <path class="wof-pointer-shadow" opacity=".2" d="M261.02 41.96c6.74 9.2 10.54 20.04 11.98 31.3V88c-1.9 14.78-8.25 28.63-18.78 39.24-11 11.34-25.83 18.16-41.52 19.78h-12.65c-3.8-.6-7.57-1.4-11.22-2.63C132.4 126.43 76 108.37 19.55 90.5c-3.4-1.22-8.1-1.62-10.12-4.94-2.2-3.14-1.5-6.3-.6-9.73 55.02 17.4 110 35 164.97 52.5 6.14 1.85 12.8 4.65 19.2 4.66 4.97 0 10.02.24 14.97-.3 14-2 27.3-8.4 37.33-18.4 10.3-9.87 17.2-23.24 19.38-37.33.63-5.27.23-10.66.34-15.97.06-6.8-2.1-12.64-4-19.04v.01z"></path>
            <ellipse stroke="none" ry="25" rx="25" cy="65" cx="199.124" fill="#ffffff"></ellipse>
          </g>
        </svg>
      </div>
      <div class="wof__wheel__border" id="wheel-border"></div>
    </div>
    <button id="btn-spin" class="wof__main__btn" style="display:none">🎡 GIRAR</button>
    <div class="wof__main__winners" id="winners-list"></div>
  </div>
  <div class="wof__main__r" id="right-panel" style="display:none">
    <h2 class="wof__main__title" id="wheel-title"></h2>
    <p class="wof__main__desc" id="wheel-desc"></p>
    <div class="wof__main__form" id="lead-form" style="display:none">
      <input class="fld" id="lead-first-name" placeholder="Nombre" autocomplete="given-name">
      <input class="fld" id="lead-last-name" placeholder="Apellido" autocomplete="family-name">
      <input class="fld" id="lead-email" type="email" placeholder="Email" autocomplete="email">
    </div>
    <button id="btn-spin-r" class="wof__main__btn" style="display:none">🎡 GIRAR</button>
  </div>

  <div class="wof__main__options">
    <div class="wof__main__options-item" id="btn-fullscreen" onclick="toggleFS()" title="Pantalla completa">⛶</div>
    <div class="wof__main__options-item hide-fs" id="btn-winners" onclick="toggleWinnersList()" title="Resultados">🏆</div>
    <div class="wof__main__options-item" id="btn-reset" onclick="resetWheel()" title="Reiniciar">↻</div>
    <div class="wof__main__options-item hide-fs" id="btn-sound-toggle" onclick="toggleSound()" title="Sonido">🔊</div>
  </div>

  <div class="wof__main__watermark">Powered by Check Pro</div>
  <div class="color_palette-inapp hidden" id="quick-themes"></div>
</div>

<canvas id="jsccc"></canvas>
<div id="toast" class="toast"></div>

<script>
var API='/api',data=null,parts=[],wins=[],spinning=false,rot=0,sound=true,fs=false;
var cv=document.getElementById('canvas'),cx=cv.getContext('2d');

function cfg(){return data&&data.config||{}}
function cols(){
  var c=cfg();
  return {
    sc:c.wheel_colors||['#ff7878','#7eecec','#fff171','#7280fd'],
    tc:c.wheel_slices_text_color||'#000000',
    pc:c.pointer_color||'#ff7878',
    bc:c.wheel_border_color||'#111111',
    snd:c.play_sounds!==false,
    cft:c.show_confettis!==false,
    lw:parseInt(c.wheel_lines_size)||0,
    dur:parseInt(c.wheel_spin_duration)||10
  }
}
function calcFs(n){
  if(n<10)return 14;if(n<20)return 11;if(n<40)return 9;
  if(n<80)return 7;if(n<150)return 5;return 0
}
function draw(){
  var w=cv.width,h=cv.height,cl=cols();cx.clearRect(0,0,w,h);
  cx.save();cx.translate(w/2,h/2);cx.rotate(rot);
  var n=parts.length;
  if(n){
    var a=2*Math.PI/n,fs=calcFs(n);
    parts.forEach(function(nm,i){
      var s=i*a,e=(i+1)*a;cx.beginPath();cx.moveTo(0,0);cx.arc(0,0,w/2-8,s,e);cx.closePath();
      cx.fillStyle=cl.sc[i%cl.sc.length];cx.fill();
      if(cl.lw>0){cx.strokeStyle='rgba(0,0,0,0.08)';cx.lineWidth=cl.lw;cx.stroke()}
      if(fs>0){
        cx.save();cx.rotate(s+a/2);cx.textAlign='right';cx.fillStyle=cl.tc;
        cx.font='bold '+fs+'px Inter';cx.shadowColor='rgba(0,0,0,0.3)';cx.shadowBlur=2;
        var d=nm;if(nm.length>12&&fs>7)d=nm.slice(0,10)+'..';
        else if(nm.length>18&&fs<=7)d=nm.slice(0,14)+'..';
        cx.fillText(d,w/2-18,fs/3);cx.restore()
      }
    });
    // pins
    var pinR=Math.min(w,h)/60;
    for(var i=0;i<n;i++){var an=i*a;cx.beginPath();cx.arc(Math.cos(an)*(w/2-12),Math.sin(an)*(w/2-12),pinR,0,2*Math.PI);cx.fillStyle='rgba(255,255,255,0.5)';cx.fill()}
  }
  // center
  var r=50;cx.beginPath();cx.arc(0,0,r,0,2*Math.PI);cx.fillStyle='#fff';cx.fill();
  cx.strokeStyle='rgba(0,0,0,0.1)';cx.lineWidth=2;cx.stroke();
  cx.restore()
}
function updDesign(){
  var cl=cols();
  var sc=document.getElementById('screencast');
  var bg=c.page_background_color||'#D1E4FF';
  sc.style.backgroundColor=bg;
  sc.style.color=c.main_color||'#1a1a1a';
  document.querySelector('.wof__wheel__pointer-svg path').setAttribute('fill',cl.pc);
  document.querySelector('.wof__wheel__border').style.borderColor=cl.bc;
  document.querySelectorAll('.wof__main__btn').forEach(function(b){b.style.backgroundColor=c.main_color||'#1a1a1a';b.style.color='#fff'});
}

function spin(){
  if(spinning||!parts.length)return;
  if(cfg().capture_leads&&!document.getElementById('lead-form').classList.contains('submitted')){
    var fn=document.getElementById('lead-first-name')?.value?.trim();
    var ln=document.getElementById('lead-last-name')?.value?.trim();
    var em=document.getElementById('lead-email')?.value?.trim();
    if(!fn||!em){toast('Completa nombre y email','err');return}
    document.getElementById('lead-form').classList.add('submitted');
    fetch(API+'/raffles/'+data.id+'/spin-with-lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({winnerName:'___lead___',name:fn+' '+ln,email:em})}).catch(function(){});
  }
  spinning=true;
  document.querySelectorAll('.wof__main__btn').forEach(function(b){b.disabled=true});
  document.getElementById('winner-display').style.display='none';
  var cl=cols(),dur=cl.dur*1000;
  var extra=5+Math.random()*4,target=rot+extra*2*Math.PI,st=Date.now(),sr=rot;
  if(sound)tick();
  !function an(){
    var p=Math.min((Date.now()-st)/dur,1),e=1-Math.pow(1-p,3);
    rot=sr+(target-sr)*e;draw();
    if(p<1)requestAnimationFrame(an);else{
      spinning=false;
      document.querySelectorAll('.wof__main__btn').forEach(function(b){b.disabled=false});
      var a=2*Math.PI/parts.length,f=(-rot)%(2*Math.PI);if(f<0)f+=2*Math.PI;
      var idx=Math.floor(f/a)%parts.length,win=parts[idx];
      wins.push(win);
      if(cfg().wheel_auto_remove)parts=parts.filter(function(p,i){return i!==idx});
      showWin(win);
      fetch(API+'/raffles/'+data.id+'/spin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({winnerName:win})}).catch(function(){});
    }
  }()
}
function tick(){
  try{var a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.frequency.value=600+Math.random()*400;g.gain.value=.06;
  o.start();o.stop(a.currentTime+0.05)}catch(e){}
}
function showWin(nm){
  draw();
  var wd=document.getElementById('winner-display');
  document.getElementById('winner-name').textContent=nm;
  wd.style.display='block';
  if(cols().cft)confetti();
  updWinners()
}
function updWinners(){
  var wl=document.getElementById('winners-list');
  if(wins.length){wl.classList.add('show');wl.innerHTML=wins.map(function(w,i){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'🎁';return'<span style="margin-right:12px;display:inline-flex"><span style="margin-right:4px">'+(i+1)+'.</span>'+w+'</span>'}).join('')}
}
function toggleWinnersList(){document.getElementById('winners-list').classList.toggle('show')}

function confetti(){
  var cvc=document.getElementById('jsccc'),ctx=cvc.getContext('2d');
  cvc.width=window.innerWidth;cvc.height=window.innerHeight;
  var cols2=['#ff7878','#7eecec','#fff171','#7280fd','#7c3aed','#fbbf24','#34d399'];
  var p=[];
  for(var i=0;i<120;i++)p.push({x:Math.random()*cvc.width,y:-20,w:Math.random()*8+4,h:Math.random()*8+4,c:cols2[Math.floor(Math.random()*cols2.length)],vx:(Math.random()-.5)*4,vy:Math.random()*4+2,r:Math.random()*720,rv:Math.random()*10-5,life:1});
  !function an(){ctx.clearRect(0,0,cvc.width,cvc.height);var a=false;
    p.forEach(function(q){if(q.life<=0)return;q.x+=q.vx;q.y+=q.vy;q.r+=q.rv;q.life-=.005;
      ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.r*Math.PI/180);ctx.globalAlpha=Math.max(0,q.life);
      ctx.fillStyle=q.c;ctx.fillRect(-q.w/2,-q.h/2,q.w,q.h);ctx.restore();if(q.life>0)a=true});
    if(a)requestAnimationFrame(an)}(),setTimeout(function(){ctx.clearRect(0,0,cvc.width,cvc.height)},4e3)
}

function resetWheel(){rot=0;spinning=false;draw();document.getElementById('winner-display').style.display='none';document.querySelectorAll('.wof__main__btn').forEach(function(b){b.disabled=false})}
function toggleSound(){sound=!sound;document.getElementById('btn-sound-toggle').textContent=sound?'🔊':'🔇'}
function toggleFS(){
  var el=document.getElementById('screencast');
  if(!document.fullscreenElement){el.requestFullscreen().catch(function(){})}
  else{document.exitFullscreen().catch(function(){})}
}
document.addEventListener('fullscreenchange',function(){
  var el=document.getElementById('screencast');
  el.classList.toggle('fullscreen',!!document.fullscreenElement)
});
function shareWheel(){
  var u=window.location.href;
  if(navigator.share)navigator.share({title:'Ruleta | Check Pro',url:u}).catch(function(){});
  else{navigator.clipboard.writeText(u).then(function(){toast('✅ Link copiado','ok')}).catch(function(){})}
}

var tOut;
function toast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;
  t.style.display='block';clearTimeout(tOut);tOut=setTimeout(function(){t.style.display='none'},2500)
}

async function load(){
  var p=window.location.pathname.split('/'),id=null,idx=p.indexOf('raffle');
  if(idx>-1)id=p[idx+1];
  if(!id||id==='undefined'){
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.add('show');
    document.getElementById('errmsg').textContent='Ruleta no válida';return
  }
  try{
    var r=await fetch(API+'/raffles/'+id+'/public');if(!r.ok)throw Error('No encontrada');
    data=await r.json();
    parts=data.participants||[];wins=[];
    if(!parts.length){
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('show');
      document.getElementById('errmsg').textContent='Esta ruleta no tiene participantes';return
    }
    if(data.results&&data.results.length){data.results.forEach(function(rr){(rr.winners||[]).forEach(function(w){wins.push(w.name||w)})})}

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('screencast').style.display='flex';

    var c=data.config||{};
    // BG
    var sc=document.getElementById('screencast');
    sc.style.backgroundColor=c.page_background_color||'#D1E4FF';
    sc.style.color=c.main_color||'#1a1a1a';
    // Pointer color
    var pc=c.pointer_color||'#ff7878';
    document.querySelector('.wof__wheel__pointer-svg path').setAttribute('fill',pc);
    // Border color
    document.querySelector('.wof__wheel__border').style.borderColor=c.wheel_border_color||'#111111';
    // Logo
    if(c.logo)document.getElementById('wheel-logo').src=c.logo;

    // Title/Desc
    var showT=c.show_title!==false,showD=c.show_desc!==false,showBtn=c.show_start_button!==false;
    if(showT&&c.title)document.getElementById('wheel-title').textContent=c.title;
    else document.getElementById('wheel-title').style.display='none';
    if(showD&&c.description)document.getElementById('wheel-desc').textContent=c.description;
    else document.getElementById('wheel-desc').style.display='none';

    // Spin button
    var btnT=c.start_button||'GIRAR';
    document.querySelectorAll('.wof__main__btn').forEach(function(b){b.textContent='🎡 '+btnT});

    // Lead capture
    if(c.capture_leads){
      document.getElementById('lead-form').style.display='block';
      document.getElementById('btn-spin').style.display='none';
    }else{
      document.getElementById('btn-spin').style.display='flex';
    }

    // Right panel visibility
    if(showT||showD||showBtn){document.getElementById('right-panel').style.display='flex'}

    // Sound
    sound=c.play_sounds!==false;
    document.getElementById('btn-sound-toggle').textContent=sound?'🔊':'🔇';

    // Themes
    var themes=window._wheelThemes;
    if(themes&&themes.length){
      document.getElementById('quick-themes').classList.remove('hidden');
      document.getElementById('quick-themes').innerHTML=themes.map(function(t,i){
        return '<div class="cp" onclick="useTheme('+i+')">'+t.colors.map(function(c){return'<span style="background:'+c+'"></span>'}).join('')+'</div>'
      }).join('')
    }

    draw();
    if(wins.length)updWinners();
    document.getElementById('stat-p').textContent=parts.length;
  }catch(e){
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.add('show');
    document.getElementById('errmsg').textContent='Error al cargar la ruleta'
  }
}
load();
</script>
</body>
</html>
