<div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: auto; padding: 40px; border-radius: 32px; background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); color: #ffffff;">
    <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 10px; text-align: center;">¡Te esperamos!</h2>
    <p style="text-align: center; opacity: 0.9; margin-bottom: 40px;">Hola {{guest_name}}, solo faltan unos días para nuestro gran encuentro.</p>
    
    <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 30px;">
        <p style="margin: 0; font-size: 14px; opacity: 0.8; text-transform: uppercase; font-weight: 900;">Recordatorio:</p>
        <p style="margin: 5px 0 0 0; font-size: 20px; font-weight: bold;">{{event_name}}</p>
        <p style="margin: 10px 0 0 0; font-size: 16px;">📅 {{event_date}}</p>
    </div>

    <div style="text-align: center;">
        <a href="{{login_url}}" style="display: inline-block; background: #ffffff; color: #7c3aed; padding: 16px 32px; border-radius: 16px; text-decoration: none; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Ver Detalles</a>
    </div>
</div>
