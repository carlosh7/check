<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Satisfacción - Check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg);">
    <div class="card" style="width: 100%; max-width: 450px;">
        <h1 style="text-align: center; margin-bottom: 2rem;">Tu Opinión Importa</h1>
        <form id="survey-form">
            <div class="form-group">
                <label>¿Cómo calificarías tu experiencia? (1-5 ⭐)</label>
                <div style="display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0;">
                    <label style="cursor: pointer;"><input type="radio" name="rating" value="1" required> 1</label>
                    <label style="cursor: pointer;"><input type="radio" name="rating" value="2"> 2</label>
                    <label style="cursor: pointer;"><input type="radio" name="rating" value="3"> 3</label>
                    <label style="cursor: pointer;"><input type="radio" name="rating" value="4"> 4</label>
                    <label style="cursor: pointer;"><input type="radio" name="rating" value="5"> 5</label>
                </div>
            </div>
            <div class="form-group">
                <label>Algún comentario adicional:</label>
                <textarea id="survey-comment" placeholder="Cuéntanos más..." style="width: 100%; min-height: 100px; padding: 1rem; border-radius: var(--radius-md); border: 1px solid var(--outline);"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">Enviar Feedback</button>
        </form>
        <div id="survey-thanks" class="hidden" style="text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🎉</div>
            <h2>¡Muchas gracias!</h2>
            <p>Tu respuesta nos ayuda a mejorar para próximos eventos.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');

        document.getElementById('survey-form').onsubmit = async (e) => {
            e.preventDefault();
            const rating = document.querySelector('input[name="rating"]:checked').value;
            const comment = document.getElementById('survey-comment').value;

            const res = await fetch('/api/surveys/respond', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ event_id: eventId, rating, comment })
            });

            if (res.ok) {
                document.getElementById('survey-form').classList.add('hidden');
                document.getElementById('survey-thanks').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
