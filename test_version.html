<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Versión Automática</title>
</head>
<body>
    <h1>Test del Sistema Automático de Versionado</h1>
    
    <div id="test-results">
        <h2>Elementos a actualizar:</h2>
        <p>1. Elemento con clase 'app-version-text': <span class="app-version-text">v12.18.8</span></p>
        <p>2. Elemento con ID 'version-display': <span id="version-display">V12.18.8</span></p>
        <p>3. Elemento con ID 'login-version-display': <span id="login-version-display">v12.18.8</span></p>
    </div>

    <script>
        // Simular la función loadAppVersion
        async function loadAppVersion() {
            try {
                // Simular llamada al servidor
                const mockResponse = { version: '12.19.0' }; // Versión futura
                
                // Actualizar por clase
                document.querySelectorAll('.app-version-text').forEach(el => {
                    el.textContent = 'V' + mockResponse.version;
                });
                
                // Actualizar por ID
                const versionDisplay = document.getElementById('version-display');
                if (versionDisplay) versionDisplay.textContent = 'V' + mockResponse.version;
                
                const loginVersionDisplay = document.getElementById('login-version-display');
                if (loginVersionDisplay) loginVersionDisplay.textContent = 'v' + mockResponse.version;
                
                console.log(`[TEST] Versión actualizada a V${mockResponse.version}`);
                document.getElementById('test-results').innerHTML += 
                    `<div style="color: green; margin-top: 20px;">
                        <strong>✓ TEST EXITOSO:</strong> Todos los elementos actualizados a V${mockResponse.version}
                    </div>`;
            } catch(e) {
                console.error('[TEST] Error:', e);
            }
        }
        
        // Ejecutar test después de cargar
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadAppVersion, 1000);
        });
    </script>
</body>
</html>
